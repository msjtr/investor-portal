<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التحقق من الرمز | بوابة المستثمرين</title>
    
    <link rel="icon" type="image/svg+xml" href="https://msjtr.github.io/investor-portal/assets/images/favicon.svg">
    <meta property="og:title" content="بوابة المستثمرين | التحقق من الرمز">
    <meta property="og:description" content="أدخل رمز التحقق المرسل إلى بريدك الإلكتروني لإتمام الدخول.">
    <meta property="og:image" content="https://msjtr.github.io/investor-portal/assets/images/share-thumb.png">
    
    <link rel="stylesheet" href="../../shared/styles/variables.css">
    <link rel="stylesheet" href="../../shared/styles/utilities.css">
    <link rel="stylesheet" href="../../shared/styles/auth-layout.css">
    <link rel="stylesheet" href="verify.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

    <script src="../../shared/scripts/storage.js"></script>
    <script src="../../shared/scripts/constants.js"></script>
    <script src="../../shared/scripts/countdown.js"></script>
    <script src="../../shared/scripts/icons.js"></script>
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-card verify-card">
            
            <button onclick="history.back()" class="btn-close" title="تعديل البيانات / رجوع">
                <span class="flex-center" data-icon="close"></span>
            </button>

            <div class="auth-header">
                <img src="https://msjtr.github.io/investor-portal/assets/images/logo.svg" alt="تيرا" class="auth-logo">
                <h2 class="text-main">أدخل رمز التحقق</h2>
                <p class="text-muted">تم إرسال رمز مكون من 6 أرقام إلى بريدك الإلكتروني</p>
                <span id="userEmailDisplay" class="text-primary font-bold"></span>
            </div>

            <form id="otpForm" class="flex-column gap-20">
                <div class="otp-inputs-container" dir="ltr">
                    <input type="text" class="otp-input" maxlength="1" autofocus required>
                    <input type="text" class="otp-input" maxlength="1" required>
                    <input type="text" class="otp-input" maxlength="1" required>
                    <input type="text" class="otp-input" maxlength="1" required>
                    <input type="text" class="otp-input" maxlength="1" required>
                    <input type="text" class="otp-input" maxlength="1" required>
                </div>

                <button type="submit" id="verifyBtn" class="btn-primary w-full p-15">
                    <span>تأكيد الرمز</span>
                </button>
            </form>

            <div class="resend-container mt-20 text-center">
                <p class="text-dim">لم تصلك الرسالة؟</p>
                <div class="timer-area mt-5">
                    <span id="timerText" class="text-muted">يمكنك إعادة الطلب بعد: <b id="timerCount" class="text-primary">01:00</b></span>
                    <button id="resendBtn" class="btn-resend hidden">إعادة إرسال الرمز</button>
                </div>
            </div>

        </div>
    </div>

    <script src="../../shared/scripts/api.js"></script>
    <script src="verify.js"></script>

</body>
</html>
