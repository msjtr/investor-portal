<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التحقق الأمني | بوابة المستثمر - منصة تيرا</title>
    
    <link rel="icon" type="image/svg+xml" href="../../assets/images/favicon.svg">
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="style.css">

    <meta property="og:title" content="بوابة المستثمر في منصة تيرا | التحقق من الرمز">
    <meta property="og:description" content="أدخل رمز التحقق (OTP) المرسل لإتمام عملية الوصول الآمن وحماية أصولك الرقمية.">
</head>
<body>

    <div class="verify-card">
        <div class="btn-back-circle" title="رجوع" onclick="history.back()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
        </div>

        <div class="logo-container">
            <h1 class="logo-text">TERA</h1>
            <p class="logo-slogan">عالمك بلا حدود</p>
        </div>

        <h2>التحقق الأمني</h2>
        <p class="instruction">أدخل رمز التحقق المكون من 6 أرقام المرسل إلى وسيلة الاتصال المسجلة لإتمام العملية.</p>

        <div class="otp-inputs-container" id="otp-inputs">
            <input type="text" class="otp-input" maxlength="1" pattern="[0-9]*" inputmode="numeric" autocomplete="one-time-code">
            <input type="text" class="otp-input" maxlength="1" pattern="[0-9]*" inputmode="numeric">
            <input type="text" class="otp-input" maxlength="1" pattern="[0-9]*" inputmode="numeric">
            <input type="text" class="otp-input" maxlength="1" pattern="[0-9]*" inputmode="numeric">
            <input type="text" class="otp-input" maxlength="1" pattern="[0-9]*" inputmode="numeric">
            <input type="text" class="otp-input" maxlength="1" pattern="[0-9]*" inputmode="numeric">
        </div>

        <div class="timer-container">
            صلاحية الكود: <span class="timer-text" id="timer">03:00</span>
        </div>

        <button class="btn-primary" id="verifyBtn" disabled>تأكيد الرمز والدخول</button>

        <div class="resend-container">
            <button class="btn-outline disabled" id="resendBtn" disabled>إعادة الإرسال</button>
        </div>

        <p style="font-size: 11px; color: #888; margin-top: 25px; line-height: 1.6;">
            حفاظاً على أمانك، لا تشارك رمز التحقق مع أي شخص مهما كانت صفته.
        </p>
    </div>

    <script src="../../assets/js/script.js"></script>
    <script src="verify.js"></script>
</body>
</html>
