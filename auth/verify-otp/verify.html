<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التحقق من الرمز | بوابة المستثمرين</title>
    
    <link rel="icon" type="image/svg+xml" href="https://msjtr.github.io/investor-portal/assets/images/favicon.svg">
    <meta property="og:title" content="بوابة المستثمرين | التحقق من الرمز">
    <meta property="og:description" content="أدخل رمز التحقق المرسل لإتمام عملية الدخول الآمن.">
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../shared/styles/variables.css">
    <link rel="stylesheet" href="../../shared/styles/utilities.css">
    <link rel="stylesheet" href="../../shared/styles/animations.css">
    <link rel="stylesheet" href="../../shared/styles/auth-layout.css">
    <link rel="stylesheet" href="verify.css">
    
    <script src="../../shared/scripts/storage.js"></script>
    <script src="../../shared/scripts/constants.js"></script>
    <script src="../../shared/scripts/auth-guard.js"></script>
    <script src="../../shared/scripts/countdown.js"></script>
    <script src="../../shared/scripts/icons.js"></script>
</head>
<body class="animate-fade-in">

    <div class="auth-wrapper">
        <div class="auth-card verify-card animate-slide-up">
            
            <button onclick="history.back()" class="btn-back-circle" title="رجوع">
                <span class="flex-center" data-icon="back"></span>
            </button>

            <div class="auth-header text-center">
                <div class="logo-container">
                    <img src="https://msjtr.github.io/investor-portal/assets/images/logo.svg" alt="تيرا" class="auth-logo">
                </div>
                <h2 class="text-white font-black mt-20">رمز التحقق (OTP)</h2>
                <p class="text-white opacity-80 mt-5">أدخل الرمز المكون من 6 أرقام المرسل إلى:</p>
                <div id="userEmailDisplay" class="text-primary font-bold mt-5 animate-pulse"></div>
            </div>

            <form id="otpForm" class="flex-column mt-30">
                <div class="otp-inputs-container" dir="ltr">
                    <input type="text" class="otp-input" maxlength="1" inputmode="numeric" autofocus required>
                    <input type="text" class="otp-input" maxlength="1" inputmode="numeric" required>
                    <input type="text" class="otp-input" maxlength="1" inputmode="numeric" required>
                    <input type="text" class="otp-input" maxlength="1" inputmode="numeric" required>
                    <input type="text" class="otp-input" maxlength="1" inputmode="numeric" required>
                    <input type="text" class="otp-input" maxlength="1" inputmode="numeric" required>
                </div>

                <button type="submit" id="verifyBtn" class="btn-primary mt-30">
                    <span>تأكيد الرمز</span>
                </button>
            </form>

            <div class="resend-container mt-30 text-center">
                <p class="text-white opacity-70">لم يصلك الرمز؟</p>
                <div class="timer-area mt-10">
                    <div id="timerWrapper" class="flex-center gap-10">
                        <span class="text-white">إعادة الطلب خلال:</span>
                        <b id="timerCount" class="text-primary font-bold">01:00</b>
                    </div>
                    <button id="resendBtn" class="btn-outline w-full mt-15 hidden">
                        إعادة إرسال الرمز
                    </button>
                </div>
            </div>

        </div>
    </div>

    <script src="../../shared/scripts/api.js"></script>
    <script src="../../shared/scripts/notifications.js"></script>
    <script src="verify.js"></script>

</body>
</html>
