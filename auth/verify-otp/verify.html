<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التحقق الأمني | بوابة المستثمر - منصة تيرا</title>
    
    <link rel="icon" type="image/svg+xml" href="https://msjtr.github.io/investor-portal/assets/images/favicon.svg">
    <meta property="og:title" content="بوابة المستثمر في منصة تيرا | التحقق من الرمز">
    <meta property="og:description" content="أدخل رمز التحقق (OTP) المرسل لإتمام عملية الوصول الآمن وحماية أصولك الرقمية.">
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* التنسيقات العامة والهوية البصرية */
        :root {
            --primary-dark: #0A2540;
            --primary-light: #38bdf8;
            --bg-color: #f4f7f6;
            --text-main: #333333;
            --text-muted: #666666;
            --error-color: #ef4444;
            --success-color: #10b981;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* خلفية أنيقة يمكن استبدالها بصورة مستقبلاً */
            background-image: radial-gradient(circle at top right, #e0f2fe 0%, transparent 40%),
                              radial-gradient(circle at bottom left, #e0f2fe 0%, transparent 40%);
        }

        /* حاوية Glassmorphism */
        .auth-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 30px rgba(10, 37, 64, 0.08);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-sizing: border-box;
        }

        /* الشعار */
        .logo-container {
            margin-bottom: 30px;
        }
        .logo-text {
            font-size: 32px;
            font-weight: 800;
            color: var(--primary-dark);
            margin: 0;
            letter-spacing: 2px;
        }
        .logo-slogan {
            font-size: 14px;
            color: var(--primary-light);
            font-weight: 600;
            margin: 5px 0 0;
        }

        /* النصوص التوضيحية */
        h2 {
            color: var(--primary-dark);
            font-size: 22px;
            margin-bottom: 10px;
        }
        p.instruction {
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* صناديق الـ OTP */
        .otp-wrapper {
            display: flex;
            justify-content: space-between;
            direction: ltr; /* لضمان كتابة الأرقام من اليسار لليمين */
            margin-bottom: 25px;
        }
        .otp-input {
            width: 50px;
            height: 60px;
            font-size: 24px;
            font-weight: 700;
            text-align: center;
            border: 2px solid #e2e8f0;
