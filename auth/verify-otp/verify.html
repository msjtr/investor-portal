    <link rel="icon" type="image/svg+xml" href="https://msjtr.github.io/investor-portal/assets/images/favicon.svg">
    
    <meta property="og:title" content="بوابة المستثمر في منصة تيرا | التحقق من الرمز">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

<body class="animate-fade-in">

    <div class="auth-wrapper">
        <div class="auth-card animate-slide-up">
            
            <div class="btn-back-circle" title="رجوع" onclick="history.back()">
                <span data-icon="arrow-right"></span>
            </div>

            <div class="auth-header text-center">
                <div class="logo-container">
                    <img src="https://msjtr.github.io/investor-portal/assets/images/logo.svg" alt="منصة تيرا" class="auth-logo">
                </div>
                <h2 class="text-white font-black mt-20">التحقق الأمني</h2>
                <p class="text-primary font-bold text-sm m-0">عالمك بلا حدود</p>
                <p class="text-white opacity-80 mt-10 text-xs">أدخل رمز التحقق (OTP) المرسل إليك لإتمام العملية</p>
            </div>

            <div class="flex-column mt-25">
                <div class="otp-inputs-container" id="otp-inputs">
                    <input type="text" class="otp-input" maxlength="1" pattern="[0-9]*" inputmode="numeric" autocomplete="one-time-code" autofocus>
