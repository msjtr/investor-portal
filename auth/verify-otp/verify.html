<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التحقق الأمني | بوابة المستثمر في منصة تيرا</title>
    
    <link rel="icon" type="image/svg+xml" href="https://msjtr.github.io/investor-portal/assets/images/favicon.svg">
    <meta property="og:title" content="بوابة المستثمر في منصة تيرا | التحقق الأمني">
    <meta property="og:description" content="نظام التحقق الأمني المتقدم لحماية حسابك الاستثماري في منصة تيرا — عالمك بلا حدود.">
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../../shared/styles/variables.css">
    <link rel="stylesheet" href="../../shared/styles/utilities.css">
    <link rel="stylesheet" href="../../shared/styles/animations.css">
    <link rel="stylesheet" href="../../shared/styles/auth-layout.css">
    
    <link rel="stylesheet" href="verify.css">
    </head>
<body class="animate-fade-in">

    <div class="auth-wrapper">
        <div class="auth-card animate-slide-up position-relative">
            
            <button type="button" id="backBtn" class="back-btn-circular" title="العودة للصفحة السابقة" aria-label="رجوع" onclick="window.history.back()">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
            </button>
            
            <div class="auth-header text-center">
                <div class="logo-container">
                    <img src="https://msjtr.github.io/investor-portal/assets/images/logo.svg" alt="منصة تيرا" class="auth-logo">
                </div>
                <h2 class="text-white font-black mt-20">التحقق الأمني</h2>
                <p class="text-primary font-bold text-sm m-0">عالمك بلا حدود</p>
                <p class="text-white opacity-80 mt-10 text-xs" id="verifyMessage">الرجاء إدخال رمز التحقق المرسل إليك</p>
            </div>

            <form id="verifyForm" class="flex-column mt-25">
                
                <div class="otp-container flex-center gap-10 mb-20" dir="ltr">
                    <input type="text" class="otp-input auth-input text-center font-bold" maxlength="1" pattern="[0-9]" inputmode="numeric" autocomplete="one-time-code" required autofocus>
                    <input type="text" class="otp-input auth-input text-center font-bold" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
                    <input type="text" class="otp-input auth-input text-center font-bold" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
                    <input type="text" class="otp-input auth-input text-center font-bold" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
                    <input type="text" class="otp-input auth-input text-center font-bold" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
                    <input type="text" class="otp-input auth-input text-center font-bold" maxlength="1" pattern="[0-9]" inputmode="numeric" required>
                </div>

                <div class="timer-container text-center mb-15">
                    <p class="text-dim text-sm m-0">ينتهي الرمز خلال: <span id="countdown" class="text-primary font-bold">03:00</span></p>
                </div>

                <button type="submit" id="verifyBtn" class="btn-primary mt-10">
                    <span>تأكيد الرمز</span>
                </button>
            </form>

            <div class="resend-container text-center mt-20 pt-15 border-top">
                <p class="text-white text-xs m-0">لم يصلك الرمز؟ 
                    <button id="resendBtn" class="register-link text-dim font-bold" style="background: none; border: none; cursor: pointer;">إعادة إرسال</button>
                </p>
            </div>

            <div class="security-notice mt-25 text-right">
                <div class="flex-center gap-5 mb-5 text-primary">
                    <span data-icon="shield"></span>
                    <span class="font-bold text-xs">أمان الهوية والتدقيق (Zero Trust)</span>
                </div>
                <p class="text-dim text-xs m-0" style="line-height: 1.6; font-size: 0.75rem;">
                    هذا الرمز مخصص لعملية واحدة فقط ولا تقم بمشاركته مع أي شخص. منصة تيرا لا تطلب منك رمز التحقق عبر أي وسيلة اتصال.
                </p>
            </div>

        </div>
    </div>

    <script type="module">
        import { sendLoginRequest, getCustomerName } from '../../js/core.js';
        import { getFromStorage } from '../../shared/scripts/storage.js';
        import { showNotification } from '../../shared/scripts/notifications.js';

        // 1. تخصيص رسالة الترحيب باسم العميل
        async function personalizeGreeting() {
            try {
                const email = new URLSearchParams(window.location.search).get('email') || getFromStorage('pending_email');
                if (email) {
                    const name = await getCustomerName(email);
                    document.getElementById('verifyMessage').innerText = `مرحباً بك يا ${name}، الرجاء إدخال الرمز المرسل لإيميلك.`;
                }
            } catch (err) {
                console.warn("[Verify Engine] Name fetch fallback triggered.");
            }
        }

        // 2. تفعيل زر إعادة الإرسال عبر النواة مع التأثير البصري
        const resendBtn = document.getElementById('resendBtn');
        if (resendBtn) {
            resendBtn.addEventListener('click', async (e) => {
                e.preventDefault();
                const email = new URLSearchParams(window.location.search).get('email') || getFromStorage('pending_email');
                
                if (email) {
                    resendBtn.disabled = true;
                    resendBtn.innerText = "جاري الإرسال...";
                    
                    const success = await sendLoginRequest(email);
                    
                    if (success) {
                        showNotification("تم إعادة إرسال الرمز بنجاح", "success");
                        resendBtn.innerText = "تم الإرسال";
                        // منع إعادة الإرسال المزعج لمدة دقيقة
                        setTimeout(() => {
                            resendBtn.disabled = false;
                            resendBtn.innerText = "إعادة إرسال";
                        }, 60000);
                    } else {
                        showNotification("فشل الإرسال، يرجى الانتظار والمحاولة لاحقاً", "error");
                        resendBtn.disabled = false;
                        resendBtn.innerText = "إعادة إرسال";
                    }
                }
            });
        }

        // 3. حقن الأيقونات بعد رندرة الواجهة
        async function loadIconsEngine() {
            try {
                const iconsModule = await import('../../shared/scripts/icons.js');
                if (iconsModule && typeof iconsModule.initIcons === 'function') {
                    iconsModule.initIcons();
                }
            } catch (iconErr) { console.warn("[Icons Engine] Pending...", iconErr); }
        }

        document.addEventListener('DOMContentLoaded', () => {
            personalizeGreeting();
            loadIconsEngine();
        });
    </script>

    <script type="module" src="verify.js"></script>

</body>
</html>
