<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب استثماري | بوابة المستثمر في منصة تيرا</title>
    
    <link rel="icon" type="image/svg+xml" href="https://msjtr.github.io/investor-portal/assets/images/favicon.svg">
    <meta property="og:title" content="BETA | بوابة المستثمر في منصة تيرا | إنشاء حساب">
    <meta property="og:description" content="انضم إلينا كمسؤول محفظة وابدأ بإدارة استثماراتك بذكاء وأمان سيبراني متقدم عبر منصة تيرا — عالمك بلا حدود.">
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../shared/styles/variables.css">
    <link rel="stylesheet" href="../../shared/styles/utilities.css">
    <link rel="stylesheet" href="../../shared/styles/animations.css">
    <link rel="stylesheet" href="../../shared/styles/auth-layout.css">
    <link rel="stylesheet" href="register.css">
</head>
<body class="animate-fade-in">

    <div class="auth-wrapper">
        <div class="auth-card animate-slide-up">
            
            <div class="auth-header text-center">
                <div class="logo-container">
                    <img src="https://msjtr.github.io/investor-portal/assets/images/logo.svg" alt="منصة تيرا" class="auth-logo">
                </div>
                <h2 class="text-white font-black mt-20">بوابة المستثمر</h2>
                <p class="text-primary font-bold text-sm m-0">عالمك بلا حدود</p>
                <p class="text-white opacity-80 mt-10 text-xs">أنشئ حسابك الاستثماري الجديد بخطوات آمنة</p>
            </div>

            <form id="registerForm" class="flex-column mt-25">
                
                <div class="input-group mb-15">
                    <label for="fullName">الاسم الكامل</label>
                    <div class="input-wrapper">
                        <span class="input-icon" data-icon="user"></span>
                        <input type="text" id="fullName" class="auth-input" placeholder="مثال: محمد بن صالح الشمري" required autofocus autocomplete="name">
                    </div>
                </div>

                <div class="input-group mb-15">
                    <label for="email">البريد الإلكتروني</label>
                    <div class="input-wrapper">
                        <span class="input-icon" data-icon="email"></span>
                        <input type="email" id="email" class="auth-input" placeholder="name@domain.com" required autocomplete="email">
                    </div>
                </div>

                <div class="input-group mb-15">
                    <label for="phone">رقم الجوال</label>
                    <div class="input-wrapper">
                        <span class="input-icon" data-icon="phone"></span>
                        <input type="tel" id="phone" class="auth-input" placeholder="05xxxxxxxx" required autocomplete="tel">
                    </div>
                </div>

                <div class="input-group mb-15">
                    <div class="input-header flex-between mb-5">
                        <label for="password">كلمة المرور</label>
                    </div>
                    <div class="input-wrapper" style="position: relative;">
                        <span class="input-icon" data-icon="lock"></span>
                        <input type="password" id="password" class="auth-input" placeholder="أدخل كلمة مرور قوية" required autocomplete="new-password">
                        
                        <button type="button" id="togglePassword" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: inherit; opacity: 0.6; display: flex; align-items: center; justify-content: center; padding: 5px;">
                            <span data-icon="eye"></span>
                        </button>
                    </div>
                </div>

                <div class="register-agreement mt-10 mb-15 text-right">
                    <label class="custom-checkbox flex-center gap-5 cursor-pointer" style="justify-content: flex-start;">
                        <input type="checkbox" id="agreeTerms" required>
                        <span class="text-dim text-xs">أوافق على <a href="#" class="text-primary font-bold" target="_blank">الشروط والأحكام</a> وسياسة الخصوصية</span>
                    </label>
                </div>

                <button type="submit" id="registerBtn" class="btn-primary mt-10">
                    <span>إنشاء الحساب الاستثماري</span>
                </button>
            </form>

            <div class="register-footer text-center mt-20 pt-15 border-top">
                <p class="text-white text-xs m-0">لديك حساب بالفعل؟ <a href="../login/login.html" class="register-link text-primary font-bold">سجل دخولك الآن</a></p>
            </div>

            <div class="security-notice mt-25 text-right">
                <div class="flex-center gap-5 mb-5 text-primary">
                    <span data-icon="shield"></span>
                    <span class="font-bold text-xs">أمان الهوية والتدقيق (Zero Trust)</span>
                </div>
                <p class="text-dim text-xs m-0" style="line-height: 1.6; font-size: 0.75rem;">
                    يقر المستخدم بأن جميع البيانات المدخلة صحيحة وتعود له شخصياً. تطبق منصة تيرا معايير التشفير والتدقيق المتقدمة لحماية بياناتك وأصولك الرقمية.
                </p>
            </div>

        </div>
    </div>

    <script type="module">
        import { initIcons } from '../../shared/scripts/icons.js';
        
        document.addEventListener('DOMContentLoaded', () => {
            try {
                initIcons();
            } catch (err) {
                console.warn("[Icons Engine] System loading pending or bypassed:", err);
            }
        });
    </script>

    <script type="module" src="register.js"></script>

</body>
</html>
