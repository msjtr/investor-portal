<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب استثماري | بوابة المستثمر في منصة تيرا</title>
    
    <link rel="icon" type="image/svg+xml" href="https://msjtr.github.io/investor-portal/assets/images/favicon.svg">
    <meta property="og:title" content="BETA | بوابة المستثمر في منصة تيرا | إنشاء حساب">
    <meta property="og:description" content="انضم إلينا كمسؤول محفظة وابدأ بإدارة استثماراتك بذكاء وأمان سيبراني متقدم عبر منصة تيرا — عالمك بلا حدود.">
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../shared/styles/variables.css">
    <link rel="stylesheet" href="../../shared/styles/utilities.css">
    <link rel="stylesheet" href="../../shared/styles/animations.css">
    <link rel="stylesheet" href="../../shared/styles/auth-layout.css">
    <link rel="stylesheet" href="register.css">

    <style>
        .secure-badge { display: inline-flex; align-items: center; gap: 5px; background: rgba(6, 214, 160, 0.15); color: #06D6A0; padding: 6px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; border: 1px solid rgba(6, 214, 160, 0.3); margin-top: 15px; }
        
        .phone-group { display: flex; gap: 10px; width: 100%; }
        .phone-group select { width: 35%; padding: 0 15px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; color: #fff; font-family: inherit; outline: none; }
        .phone-group select option { background: #1a103c; color: #fff; }
        .phone-group .input-wrapper { width: 65%; }

        .match-msg { font-size: 12px; margin-top: 8px; display: none; font-weight: bold; }
        .match-msg.valid { color: #06D6A0; display: block; }
        .match-msg.invalid { color: #ef476f; display: block; }
        
        .rules-box { background: rgba(0, 0, 0, 0.2); padding: 15px; border-radius: 8px; margin-top: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .rules-box p { margin: 0 0 10px 0; font-size: 12px; color: #FFD166; font-weight: bold; }
        .rule-item { font-size: 11.5px; color: rgba(255,255,255,0.5); margin-bottom: 6px; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .rule-item.pass { color: #06D6A0; font-weight: bold; }
        .rule-item.fail { color: #ef476f; }

        .strength-meter { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 10px; overflow: hidden; }
        .strength-bar { height: 100%; width: 0; transition: 0.4s ease; }
        .strength-text { font-size: 11px; font-weight: bold; margin-top: 5px; text-align: left; direction: ltr; }

        /* الشروط والأحكام بتصميم Accordion */
        .agreement-section { margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; }
        .agreement-item { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; padding: 15px; margin-bottom: 12px; }
        .agreement-header { display: flex; align-items: flex-start; gap: 10px; }
        .agreement-header input[type="checkbox"] { margin-top: 4px; width: 16px; height: 16px; cursor: pointer; accent-color: #FFD166; }
        .agreement-header label { font-size: 12.5px; color: rgba(255,255,255,0.9); line-height: 1.6; cursor: pointer; margin: 0; }
        .toggle-btn { background: none; border: none; color: #FFD166; font-size: 11px; margin-top: 8px; padding: 0; cursor: pointer; text-decoration: underline; display: flex; align-items: center; gap: 5px; }
        .agreement-details { display: none; font-size: 11.5px; color: rgba(255,255,255,0.6); padding: 10px 15px; margin-top: 10px; border-right: 2px solid #FFD166; background: rgba(0,0,0,0.2); line-height: 1.7; }

        /* مركز الحماية */
        .security-center { background: rgba(6, 214, 160, 0.05); border: 1px solid rgba(6, 214, 160, 0.2); border-radius: 8px; padding: 15px; margin-bottom: 25px; margin-top: 20px; }
        .security-center h3 { color: #06D6A0; font-size: 14px; margin: 0 0 10px 0; display: flex; align-items: center; gap: 8px; }

        /* الإشعارات الجانبية وشاشة التحميل */
        .notification-container { position: fixed; top: 20px; left: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .notification { background: #fff; padding: 15px 20px; border-radius: 8px; box-shadow: 0 5px 20px rgba(0,0,0,0.2); border-right: 4px solid; min-width: 280px; transform: translateX(-120%); transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); font-size: 13px; font-weight: bold; color: #333; display: flex; align-items: center; gap: 10px; direction: rtl; }
        .notification.show { transform: translateX(0); }
        .notif-success { border-color: #06D6A0; }
        .notif-error { border-color: #ef476f; }
        .notif-warning { border-color: #FFD166; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(26, 16, 60, 0.95); z-index: 10000; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .spinner { width: 50px; height: 50px; border: 4px solid rgba(255, 209, 102, 0.2); border-top-color: #FFD166; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="animate-fade-in">

    <div class="notification-container" id="notifContainer"></div>

    <div class="overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <h2 class="text-white font-bold" style="color: #FFD166;">تم إتمام التحقق وإنشاء الحساب بنجاح</h2>
        <p class="text-white opacity-80 text-sm">جاري توجيهكم إلى صفحة تسجيل الدخول…</p>
    </div>

    <div class="auth-wrapper">
        <div class="auth-card animate-slide-up" style="max-width: 600px;">
            
            <div class="auth-header text-center">
