<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استعادة كلمة المرور | بوابة المستثمرين</title>
    
    <link rel="icon" type="image/svg+xml" href="https://msjtr.github.io/investor-portal/assets/images/favicon.svg">
    <meta property="og:title" content="بوابة المستثمرين | استعادة كلمة المرور">
    <meta property="og:description" content="أدخل بريدك الإلكتروني لاستعادة الوصول إلى حسابك الاستثماري.">
    <meta property="og:image" content="https://msjtr.github.io/investor-portal/assets/images/share-thumb.png">
    <meta property="og:url" content="https://msjtr.github.io/investor-portal/auth/forgot-password/forgot.html">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://msjtr.github.io/investor-portal/assets/images/share-thumb.png">
    
    <link rel="stylesheet" href="../../shared/styles/variables.css">
    <link rel="stylesheet" href="../../shared/styles/utilities.css">
    <link rel="stylesheet" href="../../shared/styles/auth-layout.css">
    <link rel="stylesheet" href="forgot.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

    <script src="../../shared/scripts/storage.js"></script>
    <script src="../../shared/scripts/constants.js"></script>
    <script src="../../shared/scripts/icons.js"></script>
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header text-center">
                <img src="https://msjtr.github.io/investor-portal/assets/images/logo.svg" alt="تيرا" class="auth-logo">
                <h2 class="text-main">استعادة كلمة المرور</h2>
                <p class="text-muted">أدخل البريد الإلكتروني المسجل لدينا وسنرسل لك رابطاً لإعادة التعيين</p>
            </div>

            <form id="forgotForm" class="flex-column gap-15">
                <div class="input-group">
                    <label for="email">البريد الإلكتروني</label>
                    <div class="input-with-icon">
                        <span class="input-icon" data-icon="email"></span>
                        <input type="email" id="email" placeholder="example@mail.com" required autofocus>
                    </div>
                </div>

                <button type="submit" id="forgotBtn" class="btn-primary w-full p-20 mt-10">
                    <span>إرسال رابط الاستعادة</span>
                </button>
            </form>

            <div class="auth-footer mt-20 text-center">
                <p class="text-dim">تذكرت كلمة المرور؟ <a href="../login/login.html" class="text-primary">سجل دخولك</a></p>
            </div>
        </div>
    </div>

    <script src="../../shared/scripts/api.js"></script>
    <script src="forgot.js"></script>

</body>
</html>
