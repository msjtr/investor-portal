<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استعادة كلمة المرور | بوابة المستثمرين</title>
    
    <link rel="icon" type="image/svg+xml" href="https://msjtr.github.io/investor-portal/assets/images/favicon.svg">
    <meta property="og:title" content="بوابة المستثمرين | استعادة كلمة المرور">
    <meta property="og:description" content="أدخل بريدك الإلكتروني لاستعادة الوصول إلى حسابك الاستثماري عبر منصة تيرا.">
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../shared/styles/variables.css">
    <link rel="stylesheet" href="../../shared/styles/utilities.css">
    <link rel="stylesheet" href="../../shared/styles/animations.css">
    <link rel="stylesheet" href="../../shared/styles/auth-layout.css">
    <link rel="stylesheet" href="forgot.css">
    
    <script src="../../shared/scripts/storage.js"></script>
    <script src="../../shared/scripts/constants.js"></script>
    <script src="../../shared/scripts/auth-guard.js"></script>
    <script src="../../shared/scripts/icons.js"></script>
</head>
<body class="animate-fade-in">

    <div class="auth-wrapper">
        <div class="auth-card animate-slide-up">
            
            <button onclick="window.location.href='../login/login.html'" class="btn-back-circle" title="رجوع">
                <span class="flex-center" data-icon="back"></span>
            </button>

            <div class="auth-header text-center">
                <div class="logo-container">
                    <img src="https://msjtr.github.io/investor-portal/assets/images/logo.svg" alt="تيرا" class="auth-logo">
                </div>
                <h2 class="text-white font-black mt-20">استعادة الوصول</h2>
                <p class="text-white opacity-80 mt-5">أدخل البريد الإلكتروني المسجل وسنرسل لك رمز التحقق</p>
            </div>

            <form id="forgotForm" class="flex-column mt-30">
                <div class="input-group">
                    <label for="email">البريد الإلكتروني</label>
                    <div class="input-wrapper">
                        <span class="input-icon" data-icon="email"></span>
                        <input type="email" id="email" class="auth-input" placeholder="msjt301@gmail.com" required autofocus>
                    </div>
                </div>

                <button type="submit" id="forgotBtn" class="btn-primary mt-20">
                    <span>إرسال رمز الاستعادة</span>
                </button>
            </form>

            <div class="forgot-footer mt-30 text-center">
                <p class="text-white">تذكرت كلمة المرور؟ <a href="../login/login.html" class="register-link font-bold">سجل دخولك</a></p>
            </div>
        </div>
    </div>

    <script src="../../shared/scripts/api.js"></script>
    <script src="../../shared/scripts/validation.js"></script>
    <script src="../../shared/scripts/notifications.js"></script>
    <script src="forgot.js"></script>

</body>
</html>
