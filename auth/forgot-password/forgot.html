<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استعادة كلمة المرور | بوابة المستثمر في منصة تِيرا</title>
    
    <link rel="icon" type="image/svg+xml" href="https://msjtr.github.io/investor-portal/assets/images/favicon.svg">
    <meta property="og:title" content="بوابة المستثمر في منصة تِيرا | استعادة كلمة المرور">
    <meta property="og:description" content="أدخل بريدك الإلكتروني لاستعادة الوصول إلى حسابك الاستثماري بأمان وموثوقية عبر منصة تِيرا — عالمك بلا حدود.">
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../shared/styles/variables.css">
    <link rel="stylesheet" href="../../shared/styles/utilities.css">
    <link rel="stylesheet" href="../../shared/styles/animations.css">
    <link rel="stylesheet" href="../../shared/styles/auth-layout.css">
    <link rel="stylesheet" href="forgot.css">
</head>
<body class="animate-fade-in">

    <div class="auth-wrapper">
        <div class="auth-card forgot-card animate-slide-up">
            
            <button type="button" onclick="window.location.replace('../login/login.html')" class="btn-back-circle" title="العودة لتسجيل الدخول">
                <span class="flex-center" data-icon="back"></span>
            </button>

            <div class="auth-header text-center">
                <div class="logo-container">
                    <img src="https://msjtr.github.io/investor-portal/assets/images/logo.svg" alt="منصة تِيرا" class="auth-logo">
                </div>
                <h2 class="text-white font-black mt-20">بوابة المستثمر</h2>
                <p class="text-primary font-bold text-sm m-0">عالمك بلا حدود</p>
                <p class="text-white opacity-80 mt-10 text-xs">أدخل البريد الإلكتروني المسجل لإرسال كود التحقق الآمن (OTP)</p>
            </div>

            <form id="forgotForm" class="flex-column mt-25">
                <div class="input-group mb-15">
                    <label for="email">البريد الإلكتروني</label>
                    <div class="input-wrapper">
                        <span class="input-icon" data-icon="email"></span>
                        <input type="email" id="email" class="auth-input" placeholder="name@domain.com" required autofocus autocomplete="email">
                    </div>
                </div>

                <button type="submit" id="forgotBtn" class="btn-primary mt-15">
                    <span>إرسال كود الاستعادة</span>
                </button>
            </form>

            <div class="forgot-footer text-center mt-25 pt-15 border-top">
                <p class="text-white text-xs m-0">تذكرت كلمة المرور؟ <a href="../login/login.html" class="register-link text-primary font-bold">سجل دخولك الآن</a></p>
            </div>

            <div class="security-notice mt-25 text-right">
                <div class="flex-center gap-5 mb-5 text-primary">
                    <span data-icon="shield"></span>
                    <span class="font-bold text-xs">أمان الحسابات والخصوصية</span>
                </div>
                <p class="text-dim text-xs m-0" style="line-height: 1.6; font-size: 0.75rem;">
                    سيتم إرسال كود التحقق المشفر إلى وسيلة الاتصال المعتمدة. لن يتم الكشف عن حالة وجود الحساب صراحةً لأسباب أمنية (Zero Trust).
                </p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initIcons } from '../../shared/scripts/icons.js';
        
        document.addEventListener('DOMContentLoaded', () => {
            try {
                initIcons();
            } catch (err) {
                console.warn("[Icons Engine] System loading pending:", err);
            }
        });
    </script>

    <script type="module" src="forgot.js"></script>

</body>
</html>
