<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | بوابة المستثمرين</title>
    <link rel="stylesheet" href="../../shared/styles/variables.css">
    <link rel="stylesheet" href="../../shared/styles/utilities.css">
    <link rel="stylesheet" href="../../shared/styles/auth-layout.css">
    <link rel="stylesheet" href="login.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <img src="../../assets/images/logo.svg" alt="Logo" class="auth-logo">
                <h2 class="text-main">مرحباً بك مجدداً</h2>
                <p class="text-muted">سجل دخولك للوصول إلى استثماراتك</p>
            </div>

            <form id="loginForm" class="flex-column gap-20">
                <div class="input-group">
                    <label for="email">البريد الإلكتروني</label>
                    <input type="email" id="email" placeholder="example@mail.com" required>
                </div>

                <div class="input-group">
                    <label for="password">كلمة المرور</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <div class="flex-between">
                    <a href="../forgot-password/forgot.html" class="text-muted" style="font-size: 0.85rem;">نسيت كلمة المرور؟</a>
                </div>

                <button type="submit" id="loginBtn" class="btn-primary w-full p-20">دخول</button>
            </form>

            <div class="auth-footer mt-20 text-center">
                <p class="text-dim">ليس لديك حساب؟ <a href="../register/register.html" class="text-primary">أنشئ حساباً الآن</a></p>
            </div>
        </div>
    </div>

    <script src="../../shared/scripts/storage.js"></script>
    <script src="../../shared/scripts/constants.js"></script>
    <script src="../../shared/scripts/api.js"></script>
    <script src="login.js"></script>
</body>
</html>
