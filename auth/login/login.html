<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | بوابة المستثمرين</title>
    
    <link rel="icon" type="image/svg+xml" href="https://msjtr.github.io/investor-portal/assets/images/favicon.svg">
    <meta property="og:title" content="بوابة المستثمرين | تسجيل الدخول">
    <meta property="og:description" content="سجل دخولك لمتابعة محفظتك الاستثمارية بأمان وسهولة.">
    <meta property="og:image" content="https://msjtr.github.io/investor-portal/assets/images/share-thumb.png">
    <meta property="og:url" content="https://msjtr.github.io/investor-portal/auth/login/login.html">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://msjtr.github.io/investor-portal/assets/images/share-thumb.png">

    <link rel="stylesheet" href="../../shared/styles/variables.css">
    <link rel="stylesheet" href="../../shared/styles/utilities.css">
    <link rel="stylesheet" href="../../shared/styles/auth-layout.css">
    <link rel="stylesheet" href="login.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

    <script src="../../shared/scripts/storage.js"></script>
    <script src="../../shared/scripts/constants.js"></script>
    <script src="../../shared/scripts/auth-guard.js"></script>
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-card"> 
            <div class="auth-header">
                <img src="https://msjtr.github.io/investor-portal/assets/images/logo.svg" alt="بوابة المستثمرين" class="auth-logo">
                <h2 class="text-main">مرحباً بك مجدداً</h2>
                <p class="text-muted">سجل دخولك لمتابعة محفظتك الاستثمارية</p>
            </div>

            <form id="loginForm" class="flex-column gap-20">
                <div class="input-group">
                    <label for="email">البريد الإلكتروني</label>
                    <input type="email" id="email" placeholder="example@mail.com" required>
                </div>

                <div class="input-group">
                    <label for="password">كلمة المرور</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <div class="flex-between w-full">
                    <label class="flex-center gap-10 text-muted" style="font-size: 0.85rem; cursor: pointer;">
                        <input type="checkbox"> تذكرني
                    </label>
                    <a href="/investor-portal/auth/forgot-password/forgot.html" class="text-primary" style="font-size: 0.85rem;">نسيت كلمة المرور؟</a>
                </div>

                <button type="submit" id="loginBtn" class="btn-primary w-full p-20 mt-10">دخول</button>
            </form>

            <div class="auth-footer mt-20 text-center">
                <p class="text-dim">ليس لديك حساب؟ <a href="/investor-portal/auth/register/register.html" class="text-primary">سجل الآن</a></p>
            </div>
        </div>
    </div>

    <script src="../../shared/scripts/api.js"></script>
    <script src="login.js"></script>

</body>
</html>
