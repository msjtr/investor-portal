<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول | بوابة المستثمرين</title>
    <link rel="icon" type="image/svg+xml" href="../../brand-icon.svg">
    <link rel="stylesheet" href="auth.css">
</head>
<body>
<div class="auth-container">
    <div class="glass-panel">
        <img src="../../brand-icon.svg" class="brand-logo">
        <h2>تسجيل الدخول</h2>
        <form id="loginForm">
            <div class="input-group">
                <label class="input-label">اسم المستخدم أو البريد</label>
                <input type="text" id="lUser" placeholder="أدخل بيانات الحساب" required>
            </div>
            <div class="input-group">
                <label class="input-label">كلمة المرور</label>
                <div class="input-wrapper">
                    <input type="password" id="lPass" placeholder="••••••••" required>
                    <span class="material-symbols-rounded password-toggle" id="toggleLPass">visibility</span>
                </div>
            </div>
            <button type="submit" class="btn-main">دخول آمن</button>
        </form>
        <div class="switch-link">
            مستثمر جديد؟ <a href="register.html">ابدأ هنا</a>
            <br><br>
            <a href="forgot-password.html" style="font-size: 12px; color: var(--text-muted);">نسيت كلمة المرور؟</a>
        </div>
    </div>
</div>
<script>
    const setupToggle = (btnId, inputId) => {
        const btn = document.getElementById(btnId);
        const input = document.getElementById(inputId);
        btn.onclick = () => {
            const isPass = input.type === 'password';
            input.type = isPass ? 'text' : 'password';
            btn.textContent = isPass ? 'visibility_off' : 'visibility';
        };
    };
    setupToggle('toggleLPass', 'lPass');
    document.getElementById('loginForm').onsubmit = (e) => {
        e.preventDefault();
        window.location.href = "../dashboard.html";
    };
</script>
</body>
</html>
