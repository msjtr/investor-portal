<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل مستثمر جديد | بوابة المستثمرين</title>
    <link rel="stylesheet" href="../../styles/global.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <div class="auth-container" style="max-width: 480px;">
        <div class="glass-panel">
            <div class="brand-logo">
                <h2>بوابة المستثمرين</h2>
                <p>إنشاء حساب مستثمر جديد</p>
            </div>
            <form id="registerForm">
                <div class="input-group">
                    <label for="fullName">الاسم الكامل</label>
                    <input type="text" id="fullName" placeholder="أدخل اسمك الكامل" required>
                </div>
                <div class="input-group">
                    <label for="email">البريد الإلكتروني</label>
                    <input type="email" id="email" placeholder="name@example.com" required>
                </div>
                <div class="input-group">
                    <label for="password">كلمة المرور</label>
                    <input type="password" id="password" placeholder="أدخل كلمة مرور" required>
                </div>
                <button type="submit" id="submitBtn" class="btn-primary">إنشاء الحساب واستلام الكود</button>
                <div id="errorMessage" class="error-msg" style="color: #ef4444; margin-top: 10px; font-size: 14px;"></div>
                <div id="successMessage" style="color: #4ade80; text-align: center; margin-top: 15px; font-size: 14px;"></div>
            </form>
        </div>
    </div>
    <script src="../../js/register.js"></script>
</body>
</html>
