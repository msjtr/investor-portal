<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | بوابة المستثمرين</title>
    <style> /* الصق نفس كود الـ CSS الموجود في الأعلى هنا لتوحيد الشكل */ </style>
</head>
<body>
    <div class="glass-panel">
        <div id="loginStep1">
            <h2>تسجيل الدخول</h2>
            <form id="loginForm">
                <input type="email" id="lEmail" placeholder="البريد الإلكتروني" required>
                <input type="password" id="lPass" placeholder="كلمة المرور" required>
                <button type="submit" class="btn-primary">دخول</button>
            </form>
            <div class="switch-link">ليس لديك حساب؟ <a href="register.html">سجل هنا</a></div>
        </div>

        <div id="loginStep2" style="display:none;">
            <h2>تحقق من الهوية</h2>
            <p style="font-size: 14px; color: #cbd5e1;">أدخل كلمة التحقق لمرة واحدة (OTP)</p>
            <input type="text" id="lOtp" placeholder="0 0 0 0" maxlength="4" style="text-align: center; font-size: 24px; letter-spacing: 10px;">
            <div class="timer-box">إعادة الإرسال خلال: <span id="lTimer">05:00</span></div>
            <button id="resendLBtn" class="btn-primary" disabled style="background: #334155;">إعادة إرسال</button>
            <button id="finishLogin" class="btn-primary">تحقق ودخول</button>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            document.getElementById('loginStep1').style.display = 'none';
            document.getElementById('loginStep2').style.display = 'block';
            startTimer(300, 'lTimer', 'resendLBtn');
        };

        function startTimer(duration, displayId, btnId) {
            let timer = duration;
            const display = document.getElementById(displayId);
            const btn = document.getElementById(btnId);
            const interval = setInterval(() => {
                let m = Math.floor(timer / 60), s = timer % 60;
                display.textContent = `${m}:${s < 10 ? '0'+s : s}`;
                if (--timer < 0) { clearInterval(interval); btn.disabled = false; btn.style.background = "#2563eb"; }
            }, 1000);
        }

        document.getElementById('finishLogin').onclick = () => {
            alert("مرحباً بك مجدداً! جاري الدخول...");
        };
    </script>
</body>
</html>
