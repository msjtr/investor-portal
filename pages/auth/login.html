<div class="glass-panel">
    <div id="loginStep1">
        <h2>تسجيل الدخول</h2>
        <form id="loginForm">
            <input type="email" id="lEmail" placeholder="البريد الإلكتروني" required>
            <input type="password" id="lPass" placeholder="كلمة المرور" required>
            <button type="submit" class="btn-primary">دخول</button>
            <p style="font-size:14px;">ليس لديك حساب؟ <a href="register.html" style="color:#60a5fa">سجل هنا</a></p>
        </form>
    </div>

    <div id="loginStep2" style="display: none;">
        <h2>تحقق من الهوية</h2>
        <p>كود التحقق لمرة واحدة (OTP)</p>
        <input type="text" id="otpLogin" placeholder="0 0 0 0" maxlength="4" style="text-align:center; font-size: 24px;">
        <div class="timer-text">إعادة الإرسال خلال: <span id="lTimer">05:00</span></div>
        <button id="resendLBtn" class="btn-primary" style="background:#475569" disabled>إعادة إرسال</button>
        <button id="finishLogin" class="btn-primary">تحقق ودخول</button>
    </div>
</div>
<script src="login.js"></script>
