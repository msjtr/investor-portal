<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | بوابة المستثمرين</title>
    <link rel="stylesheet" href="../../styles/global.css">
    <link rel="stylesheet" href="auth-v2.css">
</head>
<body>
    <div class="auth-container">
        <div class="glass-panel" id="loginFormContainer">
            <h2 id="formTitle">تسجيل الدخول</h2>
            
            <form id="loginStep1">
                <div class="input-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="loginEmail" placeholder="example@mail.com" required>
                </div>
                <div class="input-group">
                    <label>كلمة المرور</label>
                    <input type="password" id="loginPass" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary">دخول</button>
                <p class="switch-text">ليس لديك حساب؟ <a href="register.html">إنشاء حساب جديد</a></p>
            </form>

            <div id="loginStep2" style="display: none;">
                <p>تم إرسال كلمة التحقق لمرة واحدة إلى بريدك</p>
                <div class="otp-box">
                    <input type="text" id="loginOtpInput" maxlength="4" placeholder="0 0 0 0">
                </div>
                <div id="timerBox">إعادة الإرسال خلال: <span id="lTimerText">05:00</span></div>
                <button id="resendLoginOtp" class="btn-secondary" disabled style="margin-bottom: 10px;">إعادة إرسال الكود</button>
                <button id="finalLoginBtn" class="btn-primary">تحقق ودخول</button>
            </div>
        </div>
    </div>
    <script src="login-v2.js"></script>
</body>
</html>
