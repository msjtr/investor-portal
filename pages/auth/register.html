<div class="glass-panel">
    <div id="regStep1">
        <h2>إنشاء حساب مستثمر</h2>
        <form id="registerForm">
            <input type="text" id="fullName" placeholder="الاسم الكامل" required>
            <input type="email" id="email" placeholder="البريد الإلكتروني" required>
            <input type="email" id="confirmEmail" placeholder="تأكيد البريد الإلكتروني" required>
            
            <div class="phone-group">
                <select id="countryCode">
                    <option value="+966">🇸🇦 +966</option>
                    <option value="+971">🇦🇪 +971</option>
                    <option value="+965">🇰🇼 +965</option>
                    <option value="+20">🇪🇬 +20</option>
                </select>
                <input type="tel" id="phone" placeholder="رقم الجوال" required>
            </div>

            <input type="password" id="pass" placeholder="كلمة المرور" required>
            <div id="passReqs">
                <div id="reqLen" class="requirement">● 6 أرقام/حروف على الأقل</div>
                <div id="reqChar" class="requirement">● حرف واحد على الأقل</div>
                <div id="reqSpec" class="requirement">● رمز خاص (@#$%)</div>
            </div>
            
            <input type="password" id="confirmPass" placeholder="تأكيد كلمة المرور" required>
            <button type="submit" class="btn-primary">تسجيل</button>
        </form>
    </div>

    <div id="regStep2" style="display: none;">
        <h2>تفعيل الحساب</h2>
        <p>أدخل الكود المرسل لبريدك</p>
        <input type="text" id="otpReg" placeholder="0 0 0 0" maxlength="4" style="text-align:center; font-size: 24px;">
        <div class="timer-text">إعادة الإرسال خلال: <span id="regTimer">05:00</span></div>
        <button id="resendRegBtn" class="btn-primary" style="background:#475569" disabled>إعادة إرسال</button>
        <button id="finishReg" class="btn-primary">تفعيل الآن</button>
    </div>
</div>
<script src="register.js"></script>
