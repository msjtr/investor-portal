<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب مستثمر | بوابة المستثمرين</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,fill,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    
    <style>
        /* 1. التنسيق الأساسي للمشروع (CSS) */
        :root {
            --primary: #38bdf8;         /* أزرق سماوي استثماري */
            --primary-dark: #0284c7;
            --primary-glow: rgba(56, 189, 248, 0.3);
            
            --glass-bg: rgba(255, 255, 255, 0.03); /* زجاج خفيف جداً */
            --glass-heavy: rgba(15, 23, 42, 0.6);  /* زجاج خلفي للتاكيد */
            --border: rgba(255, 255, 255, 0.1);
            
            /* ألوان الحالة لبناء الثقة */
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            
            --text-main: #ffffff;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Cairo', sans-serif;
            background: radial-gradient(circle at 0% 0%, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            direction: rtl; color: var(--text-main);
            overflow-x: hidden;
        }

        /* حاوية مرنة لضمان الاستجابة على الجوال */
        .auth-container {
            width: 92%; max-width: 460px;
            margin: 20px auto;
            transition: all 0.3s ease;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 45px 35px;
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.6),
                inset 0 1px 1px rgba(255, 255, 255, 0.05); /* إضاءة داخلية خفيفة */
            width: 100%;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
        }

        h2 { text-align: center; margin-top: 0; margin-bottom: 35px; font-weight: 800; font-size: 26px; }

        /* تنسيق الأقسام بالأيقونات الرسمية */
        .section-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 30px 0 20px 0;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
            color: var(--primary);
        }

        .section-header .material-symbols-rounded {
            font-size: 24px;
            font-variation-settings: 'FILL' 1, 'wght' 600;
            filter: drop-shadow(0 0 5px var(--primary-glow));
        }

        .section-title {
            font-size: 17px;
            font-weight: 700;
            margin: 0;
        }

        /* تنسيق المدخلات المتجاوب */
        .input-group { margin-bottom: 22px; width: 100%; text-align: right; }
        .input-label { display: block; margin-bottom: 8px; font-size: 13px; color: var(--text-muted); padding-right: 5px; font-weight: 600; }

        input, select {
            width: 100%; padding: 15px 18px;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: var(--text-main); font-family: 'Cairo'; font-size: 16px;
            box-sizing: border-box;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            appearance: none; /* إزالة سهم المتصفح الافتراضي */
        }

        input::placeholder { color: rgba(255, 255, 255, 0.2); }

        input:focus { 
            outline: none; 
            border-color: var(--primary); 
            background: rgba(0, 0, 0, 0.4); 
            box-shadow: 0 0 0 4px var(--primary-glow);
        }

        /* تنسيق رقم الجوال المستجيب */
        .phone-row { display: flex; gap: 10px; direction: ltr; }
        #countryCode { width: 105px; text-align: center; flex-shrink: 0; cursor: pointer; background: rgba(56, 189, 248, 0.05); }
        #phone { letter-spacing: 1px; }

        /* تنسيق الأيقونات المنسدلة الافتراضي */
        .input-wrapper { position: relative; width: 100%; }
        .input-icon-suffix {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
            font-size: 20px;
        }

        /* قائمة الشروط ومقياس القوة */
        .strength-container { margin: -10px 0 25px 0; padding: 0 5px; }
        .req-list { list-style: none; padding: 0; margin: 15px 0 0 0; font-size: 13px; text-align: right; }
        .req-list li { color: var(--error); margin-bottom: 6px; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
        .req-list li .material-symbols-rounded { font-size: 16px; font-variation-settings: 'wght' 600; }
        .req-list li.valid { color: var(--success); }

        .strength-bar-bg { height: 4px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; }
        .strength-fill { height: 100%; width: 0%; transition: 0.5s ease; border-radius: 10px; }

        /* الأزرار الاحترافية بنبض خفيف */
        .btn-main {
            width: 100%; padding: 18px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border: none; border-radius: 18px;
            color: white; font-weight: 700; font-size: 17px;
            cursor: pointer;
            box-shadow: 0 10px 25px -5px rgba(2, 132, 199, 0.5);
            margin-top: 15px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-main:active { transform: translateY(1px) scale(0.98); }
        .btn-main:disabled { background: #475569; box-shadow: none; cursor: not-allowed; opacity: 0.7; }

        /* زر المعاينة الاحترافي */
        .password-toggle {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-muted);
            z-index: 10;
            user-select: none;
            font-size: 20px;
            transition: 0.2s;
        }
        .password-toggle:hover { color: var(--primary); transform: translateY(-50%) scale(1.1); }

        .switch-link { text-align: center; margin-top: 25px; font-size: 14px; color: var(--text-muted); }
        .switch-link a { color: var(--primary); text-decoration: none; font-weight: 700; }

        /* --- تحسين لون القائمة المنسدلة الداخلية (الأساسي للمتصفح) --- */
        select option {
            background-color: #1a202c; /* لون داكن يناسب الخلفية */
            color: white;
            padding: 10px;
        }

        /* تحسينات للجوال الصغير */
        @media (max-width: 480px) {
            .glass-panel { padding: 35px 25px; border-radius: 28px; }
            h2 { font-size: 22px; }
            input, .btn-main { padding: 14px; font-size: 15px; }
            .phone-group select { width: 95px; font-size: 13px; }
            .section-header { margin: 25px 0 15px 0; }
        }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="glass-panel" id="regStep1">
        <h2>بوابة المستثمرين</h2>
        <form id="registerForm">
            
            <div class="section-header">
                <span class="material-symbols-rounded">account_circle</span>
                <h3 class="section-title">المعلومات الشخصية</h3>
            </div>
            
            <div class="input-group">
                <label class="input-label">الاسم الكامل</label>
                <input type="text" id="fullName" placeholder="الاسم الثلاثي كما في الهوية" required>
            </div>

            <div class="input-group">
                <label class="input-label">رقم الجوال</label>
                <div class="phone-row">
                    <select id="countryCode">
                        <option value="+966">🇸🇦 +966</option>
                        <option value="+971">🇦🇪 +971</option>
                        <option value="+20">🇪🇬 +20</option>
                    </select>
                    <input type="tel" id="phone" placeholder="5XXXXXXXX" required>
                </div>
            </div>

            <div class="input-group">
                <label class="input-label">البريد الإلكتروني</label>
                <input type="email" id="email" placeholder="example@mail.com" required>
            </div>

            <div class="input-group">
                <label class="input-label">تأكيد البريد الإلكتروني</label>
                <input type="email" id="confirmEmail" placeholder="أعد كتابة البريد للتأكيد" required>
            </div>

            <div class="section-header">
                <span class="material-symbols-rounded">lock</span>
                <h3 class="section-title">بيانات الحساب الآمن</h3>
            </div>

            <div class="input-group">
                <label class="input-label">اسم المستخدم (Username)</label>
                <input type="text" id="username" placeholder="مثال: investor_sa" required>
            </div>

            <div class="input-group">
                <label class="input-label">كلمة المرور</label>
                <div class="input-wrapper">
                    <input type="password" id="pass" placeholder="••••••••" required>
                    <span class="material-symbols-rounded password-toggle" id="togglePass">visibility</span>
                </div>
            </div>

            <div class="input-group">
                <label class="input-label">تأكيد كلمة المرور</label>
                <div class="input-wrapper">
                    <input type="password" id="confirmPass" placeholder="••••••••" required>
                    <span class="material-symbols-rounded password-toggle" id="toggleConfirmPass">visibility</span>
                </div>
            </div>

            <div class="strength-container">
                <div class="strength-bar-bg"><div id="strengthFill" class="strength-fill"></div></div>
                <ul class="req-list">
                    <li id="reqLen">● 6 أرقام/حروف على الأقل</li>
                    <li id="reqChar">● حرف واحد على الأقل</li>
                    <li id="reqSpec">● رمز خاص واحد (@#$%)</li>
                </ul>
            </div>

            <button type="submit" id="submitBtn" class="btn-main">إنشاء حساب مستثمر</button>
        </form>
        <div class="switch-link">ولديك حساب؟ <a href="login.html">سجل دخولك هنا</a></div>
    </div>
</div>

<script>
    // 2. المنطق البرمجي المدمج (JavaScript)
    const passInput = document.getElementById('pass');
    
    // --- منطق قوة كلمة المرور وتلوين الشريط ---
    passInput.addEventListener('input', () => {
        const v = passInput.value;
        const checks = {
            len: v.length >= 6,
            char: /[a-zA-Z]/.test(v),
            spec: /[\W_]/.test(v)
        };
        // تحديث ألوان القائمة بإضافة كلاس valid
        document.getElementById('reqLen').classList.toggle('valid', checks.len);
        document.getElementById('reqChar').classList.toggle('valid', checks.char);
        document.getElementById('reqSpec').classList.toggle('valid', checks.spec);
        
        // تلوين شريط القوة (أحمر، برتقالي، أخضر)
        const score = Object.values(checks).filter(Boolean).length;
        const fill = document.getElementById('strengthFill');
        fill.style.width = (score * 33.3) + "%";
        if(score === 1) fill.style.backgroundColor = "var(--error)";
        else if(score === 2) fill.style.backgroundColor = "var(--warning)";
        else if(score === 3) fill.style.backgroundColor = "var(--success)";
        else fill.style.width = "0%";
    });

    // --- منطق معاينة كلمة المرور بالأيقونات الرسمية (Toggle) ---
    const setupPasswordToggle = (toggleId, inputId) => {
        const toggleBtn = document.getElementById(toggleId);
        const inputField = document.getElementById(inputId);

        toggleBtn.addEventListener('click', () => {
            const isPressed = inputField.type === 'password';
            inputField.type = isPressed ? 'text' : 'password';
            // تبديل اسم الأيقونة الرسمية من جوجل (visibility <-> visibility_off)
            toggleBtn.textContent = isPressed ? 'visibility_off' : 'visibility';
            toggleBtn.style.color = isPressed ? 'var(--primary)' : 'var(--text-muted)';
        });
    };

    setupPasswordToggle('togglePass', 'pass');
    setupPasswordToggle('toggleConfirmPass', 'confirmPass');

    // منع الحروف في حقل الهاتف (أرقام فقط) لضمان نظافة البيانات
    document.getElementById('phone').addEventListener('input', (e) => {
        e.target.value = e.target.value.replace(/\D/g, '');
    });
</script>
</body>
</html>
