<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة المستثمرين | إنشاء حساب</title>
    
    <link rel="icon" href="data:,">
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,fill,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">

    <style>
        :root {
            --primary: #38bdf8;
            --primary-dark: #0284c7;
            --primary-glow: rgba(56, 189, 248, 0.3);
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.1);
            --success: #10b981;
            --error: #ef4444;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Cairo', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            direction: rtl; color: var(--text-main);
            overflow-x: hidden;
        }

        /* --- نظام الإشعارات المنبثقة --- */
        .toast-overlay {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 9999; display: none;
            animation: popIn 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }
        @keyframes popIn { 
            from { opacity: 0; transform: translate(-50%, -40%) scale(0.8); } 
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); } 
        }

        .toast-box {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            padding: 30px 50px; border-radius: 28px;
            text-align: center; box-shadow: 0 30px 70px rgba(0, 0, 0, 0.8);
        }

        .auth-container { width: 92%; max-width: 480px; margin: 20px auto; }
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px; padding: 40px 35px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
        }

        .section-header {
            display: flex; align-items: center; gap: 10px;
            color: var(--primary); margin: 30px 0 18px 0;
            border-bottom: 1px solid var(--glass-border); padding-bottom: 8px;
        }
        .section-header span { font-size: 24px; font-variation-settings: 'FILL' 1; }

        .input-group { margin-bottom: 22px; width: 100%; position: relative; text-align: right; }
        .input-label { display: block; color: var(--text-muted); font-size: 13px; font-weight: 600; margin-bottom: 8px; margin-right: 5px; }

        input, select {
            width: 100%; padding: 15px 18px;
            background: rgba(0, 0, 0, 0.3); border: 1px solid var(--glass-border);
            border-radius: 16px; color: var(--text-main); font-family: 'Cairo'; font-size: 16px;
            outline: none;
        }
        input:focus { border-color: var(--primary); background: rgba(0, 0, 0, 0.45); box-shadow: 0 0 0 4px var(--primary-glow); }

        select option { background: #1e293b; color: white; }
        .phone-row { display: flex; gap: 10px; direction: ltr; }
        #countryCode { width: 105px; flex-shrink: 0; cursor: pointer; }

        .pass-wrapper { position: relative; }
        
        /* خيار عرض كلمة المرور الجديد */
        .show-pass-option {
            display: flex;
            align-items: center;
            gap: 5px;
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-muted);
            font-size: 12px;
            z-index: 5;
            user-select: none;
            background: rgba(0,0,0,0.2);
            padding: 5px 8px;
            border-radius: 10px;
        }
        .show-pass-option:hover { color: var(--primary); background: rgba(0,0,0,0.4); }
        .show-pass-option span { font-size: 18px; }

        .strength-container { margin-top: 10px; }
        .strength-bar { height: 4px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; margin-bottom: 12px; }
        #strengthFill { height: 100%; width: 0; transition: 0.5s ease; }
        
        .req-list { list-style: none; padding: 0; margin: 0; font-size: 12px; }
        .req-list li { display: flex; align-items: center; gap: 8px; color: var(--error); margin-bottom: 6px; font-weight: 600; }
        .req-list li.valid { color: var(--success); }
        .req-list li span { font-size: 16px; }

        .btn-main {
            width: 100%; padding: 18px; margin-top: 25px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none; border-radius: 16px; color: white; font-weight: 800; font-size: 17px;
            cursor: pointer; box-shadow: 0 12px 24px rgba(2, 132, 199, 0.4);
        }
        .btn-main:active { transform: scale(0.97); }

        .switch-link { text-align: center; margin-top: 25px; font-size: 14px; }
        .switch-link a { color: var(--primary); text-decoration: none; font-weight: 700; }

        .cached-flash { animation: flashBlue 1.5s ease; }
        @keyframes flashBlue { 0% { border-color: var(--primary); } 100% { border-color: var(--glass-border); } }
    </style>
</head>
<body>

<div class="toast-overlay" id="toastOverlay">
    <div class="toast-box">
        <span class="material-symbols-rounded" id="toastIcon" style="font-size: 45px; color: var(--primary);">verified_user</span>
        <div id="toastMsg" style="margin-top: 10px; font-weight: 700;">جاري المعالجة...</div>
    </div>
</div>

<div class="auth-container">
    <div class="glass-panel">
        <h2 style="text-align: center; margin: 0 0 30px 0; font-weight: 800;">بوابة المستثمرين</h2>
        
        <form id="registerForm">
            <div class="section-header">
                <span class="material-symbols-rounded">person_celebrate</span>
                المعلومات الشخصية
            </div>
            
            <div class="input-group">
                <label class="input-label">الاسم الكامل</label>
                <input type="text" id="fullName" placeholder="أدخل اسمك الثلاثي كما في الهوية" required>
            </div>

            <div class="input-group">
                <label class="input-label">رقم الجوال</label>
                <div class="phone-row">
                    <select id="countryCode">
                        <option value="+966">🇸🇦 +966</option>
                        <option value="+971">🇦🇪 +971</option>
                        <option value="+20">🇪🇬 +20</option>
                    </select>
                    <input type="tel" id="phone" placeholder="أدخل رقم الجوال" required>
                </div>
            </div>

            <div class="input-group">
                <label class="input-label">البريد الإلكتروني</label>
                <input type="email" id="email" placeholder="مثال: البريد الإلكتروني" required>
            </div>

            <div class="input-group">
                <label class="input-label">تأكيد البريد الإلكتروني</label>
                <input type="email" id="confirmEmail" placeholder="أعد كتابة البريد للتأكيد" required>
            </div>

            <div class="section-header">
                <span class="material-symbols-rounded">lock_person</span>
                معلومات الحساب
            </div>

            <div class="input-group">
                <label class="input-label">اسم المستخدم</label>
                <input type="text" id="username" placeholder="اختر اسماً فريداً بالإنجليزية" required>
            </div>

            <div class="input-group">
                <label class="input-label">كلمة المرور</label>
                <div class="pass-wrapper">
                    <input type="password" id="password" placeholder="أدخل كلمة المرور" required>
                    <div class="show-pass-option" onclick="toggleView('password', this)">
                        <span class="material-symbols-rounded">visibility</span>
                        عرض كلمة المرور
                    </div>
                </div>
            </div>

            <div class="input-group">
                <label class="input-label">تأكيد كلمة المرور</label>
                <div class="pass-wrapper">
                    <input type="password" id="confirmPassword" placeholder="أعد كتابة كلمة المرور" required>
                    <div class="show-pass-option" onclick="toggleView('confirmPassword', this)">
                        <span class="material-symbols-rounded">visibility</span>
                        عرض كلمة المرور
                    </div>
                </div>
            </div>

            <div class="strength-container">
                <div class="strength-bar"><div id="strengthFill"></div></div>
                <ul class="req-list">
                    <li id="reqLen"><span class="material-symbols-rounded">gpp_maybe</span>6 خانات على الأقل</li>
                    <li id="reqChar"><span class="material-symbols-rounded">gpp_maybe</span>حرف إنجليزي واحد على الأقل</li>
                    <li id="reqSpec"><span class="
