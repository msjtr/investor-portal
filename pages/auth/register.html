<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب | بوابة المستثمرين</title>
    <style>
        :root {
            --primary: #2563eb;
            --glass: rgba(255, 255, 255, 0.07);
            --border: rgba(255, 255, 255, 0.12);
            --success: #4ade80;
            --error: #ff4d4d;
        }

        body {
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            color: white;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        /* حاوية الإشعارات في المنتصف */
        .toast-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .toast-box {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            padding: 25px 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .input-group { margin-bottom: 15px; position: relative; width: 100%; }

        input, select {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s ease;
        }

        input:focus { border-color: var(--primary); background: rgba(255, 255, 255, 0.1); }

        /* أيقونة العين لمعاينة الباسورد */
        .pass-toggle {
            position: absolute;
            left: 15px;
            top: 15px;
            cursor: pointer;
            color: #94a3b8;
            font-size: 14px;
        }

        .phone-group { display: flex; gap: 8px; }
        .phone-group select { width: 100px; }

        .req-list { text-align: right; padding: 0; margin: 10px 0; list-style: none; font-size: 12px; }
        .req-list li { color: var(--error); margin-bottom: 4px; }
        .req-list li.valid { color: var(--success); }

        /* حالة تطابق الباسورد */
        .match-msg { font-size: 12px; text-align: right; margin-top: -10px; margin-bottom: 10px; display: none; }

        .btn-primary {
            width: 100%; padding: 14px;
            background: var(--primary);
            border: none; border-radius: 12px;
            color: white; font-weight: bold; font-size: 16px;
            cursor: pointer; transition: 0.3s; margin-top: 10px;
        }

        .btn-primary:disabled { opacity: 0.5; cursor: wait; }

        @keyframes fadeIn { from { opacity: 0; transform: translate(-50%, -60%); } to { opacity: 1; transform: translate(-50%, -50%); } }
    </style>
</head>
<body>

    <div id="toastOverlay" class="toast-overlay">
        <div class="toast-box">
            <div id="toastIcon" style="font-size: 40px; margin-bottom: 10px;">✅</div>
            <div id="toastMsg" style="font-size: 16px; font-weight: 600;"></div>
        </div>
    </div>

    <div class="glass-panel">
        <div id="regStep1">
            <h2>إنشاء حساب جديد</h2>
            <form id="registerForm">
                <div class="input-group"><input type="text" id="fullName" placeholder="الاسم الكامل" required></div>
                <div class="input-group"><input type="email" id="email" placeholder="البريد الإلكتروني" required></div>
                <div class="input-group"><input type="email" id="confirmEmail" placeholder="تأكيد البريد الإلكتروني" required></div>
                
                <div class="phone-group">
                    <select id="country">
                        <option value="+966">🇸🇦 +966</option>
                        <option value="+20">🇪🇬 +20</option>
                    </select>
                    <input type="tel" id="phone" placeholder="رقم الجوال" required>
                </div>

                <div class="input-group">
                    <input type="password" id="pass" placeholder="كلمة المرور (English Only)" required>
                    <span class="pass-toggle" onclick="togglePass('pass')">👁️</span>
                </div>
                
                <ul class="req-list">
                    <li id="reqLen">● 6 خانات على الأقل</li>
                    <li id="reqChar">● حرف واحد على الأقل</li>
                    <li id="reqSpec">● رمز خاص (@#$%)</li>
                </ul>
                
                <div class="input-group">
                    <input type="password" id="confirmPass" placeholder="تأكيد كلمة المرور" required>
                    <span class="pass-toggle" onclick="togglePass('confirmPass')">👁️</span>
                </div>
                <div id="matchMsg" class="match-msg"></div>

                <button type="submit" id="submitBtn" class="btn-primary">إنشاء حساب</button>
            </form>
        </div>

        <div id="regStep2" style="display:none;">
            <h2>تفعيل الحساب</h2>
            <p style="font-size: 14px; color: #cbd5e1;">أدخل الكود المرسل لبريدك الإلكتروني</p>
            <input type="text" id="regOtp" placeholder="0 0 0 0" maxlength="4" style="text-align: center; font-size: 24px; letter-spacing: 10px;">
            <div class="timer-box">إعادة الإرسال خلال: <span id="regTimer">05:00</span></div>
            <button id="resendRegBtn" class="btn-primary" disabled style="background: #334155;">إعادة إرسال الكود</button>
            <button id="activateBtn" class="btn-primary">تفعيل وتثبيت</button>
        </div>
    </div>

    <script>
        const WEBHOOK_URL = 'https://hook.eu1.make.com/4ityw5er8v5ps0ab9gxqojxh5zsitoz5';
        let generatedOtp = null;

        // وظيفة الإشعار الجمالي
        function showToast(msg, isSuccess = true) {
            const overlay = document.getElementById('toastOverlay');
            document.getElementById('toastMsg').innerText = msg;
            document.getElementById('toastIcon').innerText = isSuccess ? '✅' : '⚠️';
            overlay.style.display = 'block';
            setTimeout(() => { overlay.style.display = 'none'; }, 3000);
        }

        // معاينة الباسورد
        function togglePass(id) {
            const input = document.getElementById(id);
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        // مراقبة كلمة المرور (إنجليزي فقط + مطابقة)
        const pass = document.getElementById('pass');
        const confirmPass = document.getElementById('confirmPass');
        const matchMsg = document.getElementById('matchMsg');

        pass.addEventListener('input', () => {
            // منع العربي
            pass.value = pass.value.replace(/[^\x00-\x7F]/g, "");
            
            const v = pass.value;
            document.getElementById('reqLen').classList.toggle('valid', v.length >= 6);
            document.getElementById('reqChar').classList.toggle('valid', /[a-zA-Z]/.test(v));
            document.getElementById('reqSpec').classList.toggle('valid', /[\W_]/.test(v));
            checkMatch();
        });

        confirmPass.addEventListener('input', checkMatch);

        function checkMatch() {
            if (confirmPass.value === "") {
                matchMsg.style.display = 'none';
                return;
            }
            matchMsg.style.display = 'block';
            if (pass.value === confirmPass.value) {
                matchMsg.innerText = "● كلمات المرور متطابقة";
                matchMsg.style.color = "var(--success)";
            } else {
                matchMsg.innerText = "● كلمات المرور غير متطابقة";
                matchMsg.style.color = "var(--error)";
            }
        }

        // إرسال النموذج (حل مشكلة عدم وصول الكود)
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const cEmail = document.getElementById('confirmEmail').value;

            if(email !== cEmail) return showToast("البريد الإلكتروني غير متطابق", false);
            if(pass.value !== confirmPass.value) return showToast("كلمة المرور غير متطابقة", false);

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "جاري إرسال كود التحقق...";

            // توليد كود التحقق
            generatedOtp = Math.floor(1000 + Math.random() * 9000).toString();

            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: document.getElementById('fullName').value,
                        email: email,
                        pin: generatedOtp
                    })
                });

                if (response.ok) {
                    showToast("تم إرسال كود التفعيل لبريدك", true);
                    document.getElementById('regStep1').style.display = 'none';
                    document.getElementById('regStep2').style.display = 'block';
                    startTimer(300, 'regTimer', 'resendRegBtn');
                } else {
                    throw new Error();
                }
            } catch (err) {
                showToast("فشل في إرسال الكود، حاول مجدداً", false);
                btn.disabled = false;
                btn.innerText = "إنشاء حساب";
            }
        });

        function startTimer(duration, displayId, btnId) {
            let timer = duration;
            const display = document.getElementById(displayId);
            const btn = document.getElementById(btnId);
            const interval = setInterval(() => {
                let m = Math.floor(timer / 60), s = timer % 60;
                display.textContent = `${m}:${s < 10 ? '0'+s : s}`;
                if (--timer < 0) { 
                    clearInterval(interval); 
                    btn.disabled = false; 
                    btn.style.background = "#2563eb"; 
                    btn.innerText = "إعادة إرسال الكود الآن";
                }
            }, 1000);
        }

        document.getElementById('activateBtn').onclick = () => {
            const entered = document.getElementById('regOtp').value;
            if (entered === generatedOtp) {
                showToast("تم تفعيل حسابكم بنجاح!", true);
                setTimeout(() => { window.location.href = "login.html"; }, 2000);
            } else {
                showToast("كود التحقق غير صحيح", false);
            }
        };
    </script>
</body>
</html>
