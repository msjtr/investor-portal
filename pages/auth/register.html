<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة المستثمرين | إنشاء حساب</title>
    
    <link rel="icon" type="image/svg+xml" href="../../brand-icon.svg">
    
    <link rel="stylesheet" href="../../styles/global.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,fill,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
</head>
<body>

<div id="toast" class="toast-center">
    <span id="toastIcon" style="font-size: 50px; display: block; margin-bottom: 15px;"></span>
    <div id="toastMsg" style="font-size: 16px; font-weight: 700;"></div>
</div>

<div class="auth-container">
    <div class="brand-logo">
        <img src="../../brand-icon.svg" alt="بوابة المستثمرين">
    </div>

    <div class="glass-panel" id="step1">
        <h2 style="text-align:center; margin-bottom: 30px;">إنشاء حساب جديد</h2>
        <form id="registerForm">
            
            <div class="section-header">
                <span class="material-symbols-rounded">person</span>
                <span style="font-weight:700;">المعلومات الشخصية</span>
            </div>
            
            <div class="input-group">
                <label class="input-label">الاسم الكامل</label>
                <input type="text" id="fullName" placeholder="أدخل اسمك الثلاثي" required>
            </div>

            <div class="input-group">
                <label class="input-label">رقم الجوال</label>
                <div class="phone-row">
                    <select id="countryCode">
                        <option value="+966">🇸🇦 +966</option>
                        <option value="+20">🇪🇬 +20</option>
                    </select>
                    <input type="tel" id="phone" placeholder="5XXXXXXXX" required>
                </div>
            </div>

            <div class="input-group">
                <label class="input-label">البريد الإلكتروني</label>
                <input type="email" id="email" placeholder="m@" required>
                <div id="emailStatus" style="font-size: 12px; margin-top: 8px;"></div>
            </div>

            <div class="input-group">
                <label class="input-label">تأكيد البريد الإلكتروني</label>
                <input type="email" id="confirmEmail" placeholder="m@" required>
            </div>

            <div class="section-header">
                <span class="material-symbols-rounded">security</span>
                <span style="font-weight:700;">بيانات الحساب</span>
            </div>

            <div class="input-group">
                <label class="input-label">اسم المستخدم</label>
                <input type="text" id="username" placeholder="أحرف إنجليزية فقط" required>
            </div>

            <div class="input-group">
                <label class="input-label">كلمة المرور</label>
                <div class="input-wrapper">
                    <input type="password" id="pass" placeholder="أحرف إنجليزية ورموز" required>
                    <span class="material-symbols-rounded password-toggle" id="togglePass">visibility</span>
                </div>
                <div class="strength-bar-bg"><div id="strengthFill" class="strength-fill"></div></div>
                <div id="strengthText" style="font-size: 11px; margin-top: 5px;">قوة كلمة المرور: --</div>
            </div>

            <div class="input-group">
                <label class="input-label">تأكيد كلمة المرور</label>
                <div class="input-wrapper">
                    <input type="password" id="confirmPass" placeholder="••••••••" required>
                    <span class="material-symbols-rounded password-toggle" id="toggleConfirmPass">visibility</span>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="btn-main">إنشاء الحساب</button>
        </form>
    </div>

    <div class="glass-panel" id="step2" style="display:none; text-align: center;">
        <h2 style="margin-bottom: 10px;">تحقق من الرمز</h2>
        <p style="color: var(--text-muted); font-size: 14px;">أدخل الرمز المكون من 4 أرقام</p>
        <div class="input-group" style="margin-top: 25px;">
            <input type="text" id="regOtp" placeholder="----" maxlength="4">
        </div>
        <div class="timer-text">إعادة الإرسال خلال: <span id="timerText" style="color: white; font-weight: bold;">05:00</span></div>
        <button id="resendBtn" class="btn-main" style="background: #334155; margin-bottom: 10px;" disabled>إعادة إرسال</button>
        <button id="activateBtn" class="btn-main">تفعيل الحساب</button>
    </div>
</div>

<script>
    // نظام الإشعارات في المنتصف
    function showNotification(msg, type = 'success') {
        const toast = document.getElementById('toast');
        const icon = document.getElementById('toastIcon');
        const text = document.getElementById('toastMsg');
        
        icon.textContent = type === 'success' ? '✅' : (type === 'error' ? '❌' : '⚠️');
        text.textContent = msg;
        text.style.color = type === 'success' ? '#10b981' : (type === 'error' ? '#ef4444' : '#f59e0b');

        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3500);
    }

    // منع الحروف العربية برمجياً
    ['username', 'pass', 'confirmPass'].forEach(id => {
        document.getElementById(id).addEventListener('input', function() {
            this.value = this.value.replace(/[^\x00-\x7F]/g, "");
        });
    });

    // تحقق تطابق البريد المباشر
    const email = document.getElementById('email');
    const confirmEmail = document.getElementById('confirmEmail');
    const emailStatus = document.getElementById('emailStatus');

    function checkEmail() {
        if (email.value && confirmEmail.value) {
            if (email.value === confirmEmail.value) {
                emailStatus.textContent = '✅ البريد الإلكتروني مطابق';
                emailStatus.style.color = '#10b981';
            } else {
                emailStatus.textContent = '';
            }
        }
    }
    email.addEventListener('input', checkEmail);
    confirmEmail.addEventListener('input', checkEmail);

    // قوة كلمة المرور
    document.getElementById('pass').addEventListener('input', function(e) {
        const v = e.target.value;
        let score = 0;
        if(v.length >= 6) score++;
        if(/[a-zA-Z]/.test(v)) score++;
        if(/[\W_]/.test(v)) score++;

        const fill = document.getElementById('strengthFill');
        const stText = document.getElementById('strengthText');
        fill.style.width = (score * 33.3) + "%";
        
        if (score === 1) { fill.style.backgroundColor = '#ef4444'; stText.textContent = 'قوة كلمة المرور: ضعيفة'; }
        else if (score === 2) { fill.style.backgroundColor = '#f59e0b'; stText.textContent = 'قوة كلمة المرور: متوسطة'; }
        else if (score === 3) { fill.style.backgroundColor = '#10b981'; stText.textContent = 'قوة كلمة المرور: قوية'; }
    });

    // إرسال البيانات
    document.getElementById('registerForm').onsubmit = async (e) => {
        e.preventDefault();
        if (email.value !== confirmEmail.value) { showNotification("البريد الإلكتروني غير متطابق", "error"); return; }
        if (document.getElementById('pass').value !== document.getElementById('confirmPass').value) {
            showNotification("❌ كلمات المرور غير متطابقة", "error");
            return;
        }

        // محاكاة إرسال OTP
        showNotification("جاري معالجة البيانات...");
        setTimeout(() => {
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
            startTimer(300);
            showNotification("تم إرسال رمز التحقق لبريدك");
        }, 1500);
    };

    function startTimer(duration) {
        let timer = duration;
        const text = document.getElementById('timerText');
        const interval = setInterval(() => {
            let m = Math.floor(timer / 60), s = timer % 60;
            text.textContent = `${m}:${s < 10 ? '0'+s : s}`;
            if (--timer < 0) {
                clearInterval(interval);
                document.getElementById('resendBtn').disabled = false;
                document.getElementById('resendBtn').style.background = "var(--primary)";
            }
        }, 1000);
    }

    // تبديل الرؤية
    ['togglePass', 'toggleConfirmPass'].forEach((btnId, idx) => {
        const inputId = idx === 0 ? 'pass' : 'confirmPass';
        document.getElementById(btnId).addEventListener('click', function() {
            const input = document.getElementById(inputId);
            input.type = input.type === 'password' ? 'text' : 'password';
            this.textContent = input.type === 'password' ? 'visibility' : 'visibility_off';
        });
    });
</script>
</body>
</html>
