<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة المستثمرين | إنشاء حساب</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,fill,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    
    <style>
        :root {
            --primary: #38bdf8;
            --primary-dark: #0284c7;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Cairo', sans-serif;
            background: radial-gradient(circle at 0% 0%, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            direction: rtl; color: var(--text-main);
        }

        .auth-container { width: 92%; max-width: 480px; margin: 20px auto; }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 40px 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
            width: 100%;
        }

        h2 { text-align: center; margin-bottom: 25px; font-weight: 800; }

        .section-header {
            display: flex; align-items: center; gap: 10px;
            margin: 25px 0 15px 0; border-bottom: 1px solid var(--border);
            padding-bottom: 8px; color: var(--primary);
        }

        .section-header .material-symbols-rounded { font-size: 22px; font-variation-settings: 'FILL' 1; }
        .section-title { font-size: 16px; font-weight: 700; margin: 0; }

        .input-group { margin-bottom: 20px; width: 100%; text-align: right; }
        .input-label { display: block; margin-bottom: 8px; font-size: 13px; color: var(--text-muted); font-weight: 600; }

        .input-wrapper { position: relative; width: 100%; }

        input, select {
            width: 100%; padding: 14px 16px;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: var(--text-main); font-family: 'Cairo'; font-size: 15px;
            box-sizing: border-box; transition: 0.3s;
            appearance: none;
        }

        input:focus { outline: none; border-color: var(--primary); background: rgba(0, 0, 0, 0.4); }

        .phone-row { display: flex; gap: 8px; direction: ltr; }
        #countryCode { width: 95px; text-align: center; cursor: pointer; }

        .password-toggle {
            position: absolute; left: 15px; top: 50%;
            transform: translateY(-50%); cursor: pointer;
            color: var(--text-muted); font-size: 20px;
        }

        .strength-bar-bg { height: 4px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-top: 10px; overflow: hidden; }
        .strength-fill { height: 100%; width: 0%; transition: 0.5s; }
        
        .req-list { list-style: none; padding: 0; margin: 12px 0; font-size: 12px; }
        .req-list li { color: var(--error); margin-bottom: 5px; display: flex; align-items: center; gap: 6px; }
        .req-list li.valid { color: var(--success); }

        .btn-main {
            width: 100%; padding: 16px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none; border-radius: 16px;
            color: white; font-weight: 700; font-size: 16px;
            cursor: pointer; box-shadow: 0 10px 20px -5px rgba(2, 132, 199, 0.4);
            margin-top: 10px;
        }
        .btn-main:disabled { opacity: 0.5; cursor: not-allowed; }

        .switch-link { text-align: center; margin-top: 20px; font-size: 13px; }
        .switch-link a { color: var(--primary); text-decoration: none; font-weight: 700; }

        /* تنسيق كود التحقق OTP */
        #regOtp { text-align: center; font-size: 32px; letter-spacing: 15px; font-weight: 800; color: var(--primary); }
        .timer-text { margin: 15px 0; font-size: 14px; color: var(--text-muted); text-align: center; }

        select option { background-color: #1a202c; color: white; }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="glass-panel" id="step1">
        <h2>بوابة المستثمرين</h2>
        <form id="registerForm">
            <div class="section-header">
                <span class="material-symbols-rounded">person</span>
                <h3 class="section-title">المعلومات الشخصية</h3>
            </div>
            
            <div class="input-group">
                <label class="input-label">الاسم الكامل</label>
                <input type="text" id="fullName" placeholder="الاسم الثلاثي" required>
            </div>

            <div class="input-group">
                <label class="input-label">رقم الجوال</label>
                <div class="phone-row">
                    <select id="countryCode">
                        <option value="+966">🇸🇦 +966</option>
                        <option value="+20">🇪🇬 +20</option>
                    </select>
                    <input type="tel" id="phone" placeholder="5XXXXXXXX" required>
                </div>
            </div>

            <div class="input-group">
                <label class="input-label">البريد الإلكتروني</label>
                <input type="email" id="email" placeholder="m@" required>
            </div>

            <div class="input-group">
                <label class="input-label">تأكيد البريد الإلكتروني</label>
                <input type="email" id="confirmEmail" placeholder="m@" required>
            </div>

            <div class="section-header">
                <span class="material-symbols-rounded">lock</span>
                <h3 class="section-title">بيانات الحساب</h3>
            </div>

            <div class="input-group">
                <label class="input-label">اسم المستخدم</label>
                <input type="text" id="username" placeholder="اختر اسم مستخدم" required>
            </div>

            <div class="input-group">
                <label class="input-label">كلمة المرور</label>
                <div class="input-wrapper">
                    <input type="password" id="pass" placeholder="••••••••" required>
                    <span class="material-symbols-rounded password-toggle" id="togglePass">visibility</span>
                </div>
                <div class="strength-bar-bg"><div id="strengthFill" class="strength-fill"></div></div>
                <ul class="req-list">
                    <li id="reqLen">● 6 خانات على الأقل</li>
                    <li id="reqChar">● حرف واحد على الأقل</li>
                    <li id="reqSpec">● رمز خاص واحد على الأقل</li>
                </ul>
            </div>

            <div class="input-group">
                <label class="input-label">تأكيد كلمة المرور</label>
                <div class="input-wrapper">
                    <input type="password" id="confirmPass" placeholder="••••••••" required>
                    <span class="material-symbols-rounded password-toggle" id="toggleConfirmPass">visibility</span>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="btn-main">إنشاء الحساب</button>
        </form>
        <div class="switch-link"><a href="login.html">الرجوع لصفحة الدخول</a></div>
    </div>

    <div class="glass-panel" id="step2" style="display:none;">
        <h2 style="margin-bottom: 10px;">التحقق من الهوية</h2>
        <p style="text-align: center; color: var(--text-muted); font-size: 14px;">أدخل الرمز المرسل إلى بريدك الإلكتروني</p>
        
        <div class="input-group" style="margin-top: 30px;">
            <input type="text" id="regOtp" placeholder="----" maxlength="4">
        </div>

        <div class="timer-text">إعادة الإرسال خلال: <span id="timerText" style="color: white; font-weight: bold;">05:00</span></div>
        
        <button id="resendBtn" class="btn-main" style="background: #334155;" disabled>إعادة إرسال الرمز</button>
        <button id="activateBtn" class="btn-main">تفعيل الحساب</button>
    </div>
</div>

<script>
    const WEBHOOK_URL = 'https://hook.eu1.make.com/4ityw5er8v5ps0ab9gxqojxh5zsitoz5';
    let generatedPin = null;

    // 1. نظام الكاش
    const cacheFields = ['fullName', 'email', 'confirmEmail', 'phone', 'username'];
    cacheFields.forEach(id => {
        const el = document.getElementById(id);
        if (localStorage.getItem('cache_'+id)) el.value = localStorage.getItem('cache_'+id);
        el.addEventListener('input', () => localStorage.setItem('cache_'+id, el.value));
    });

    // 2. معاينة كلمة المرور
    const setupToggle = (btnId, inputId) => {
        document.getElementById(btnId).addEventListener('click', function() {
            const input = document.getElementById(inputId);
            const isPass = input.type === 'password';
            input.type = isPass ? 'text' : 'password';
            this.textContent = isPass ? 'visibility_off' : 'visibility';
        });
    };
    setupToggle('togglePass', 'pass');
    setupToggle('toggleConfirmPass', 'confirmPass');

    // 3. فحص قوة كلمة المرور
    document.getElementById('pass').addEventListener('input', (e) => {
        const v = e.target.value;
        const checks = {
            len: v.length >= 6,
            char: /[a-zA-Z]/.test(v),
            spec: /[\W_]/.test(v)
        };
        document.getElementById('reqLen').classList.toggle('valid', checks.len);
        document.getElementById('reqChar').classList.toggle('valid', checks.char);
        document.getElementById('reqSpec').classList.toggle('valid', checks.spec);
        
        const score = Object.values(checks).filter(Boolean).length;
        const fill = document.getElementById('strengthFill');
        fill.style.width = (score * 33.3) + "%";
        fill.style.backgroundColor = score === 3 ? "var(--success)" : score === 2 ? "var(--warning)" : "var(--error)";
    });

    // 4. إرسال النموذج والربط مع Make
    document.getElementById('registerForm').onsubmit = async (e) => {
        e.preventDefault();
        
        if (document.getElementById('email').value !== document.getElementById('confirmEmail').value) return alert("البريد غير متطابق");
        if (document.getElementById('pass').value !== document.getElementById('confirmPass').value) return alert("كلمة المرور غير متطابقة");

        generatedPin = Math.floor(1000 + Math.random() * 9000).toString();
        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.textContent = "جاري الإرسال...";

        try {
            await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    name: document.getElementById('fullName').value,
                    email: document.getElementById('email').value,
                    pin: generatedPin
                })
            });
            
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
            startTimer(300);
        } catch (err) {
            alert("خطأ في الاتصال، حاول مرة أخرى");
            btn.disabled = false; btn.textContent = "إنشاء الحساب";
        }
    };

    // 5. المؤقت
    function startTimer(duration) {
        let timer = duration;
        const interval = setInterval(() => {
            let m = Math.floor(timer / 60), s = timer % 60;
            document.getElementById('timerText').textContent = `${m}:${s < 10 ? '0'+s : s}`;
            if (--timer < 0) {
                clearInterval(interval);
                const resend = document.getElementById('resendBtn');
                resend.disabled = false; resend.style.background = "var(--primary)";
            }
        }, 1000);
    }

    // 6. التحقق النهائي
    document.getElementById('activateBtn').onclick = () => {
        if (document.getElementById('regOtp').value === generatedPin) {
            alert("تم تفعيل حسابك بنجاح! 🎉");
            cacheFields.forEach(id => localStorage.removeItem('cache_'+id));
            window.location.href = "login.html";
        } else {
            alert("كود التحقق غير صحيح");
        }
    };
</script>
</body>
</html>
