<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب مستثمر | بوابة المستثمرين</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.lordicon.com/lordicon.js"></script>
    
    <style>
        :root {
            --primary: #38bdf8;
            --glass: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.1);
            --success: #10b981;
            --error: #ef4444;
            --text-dim: #94a3b8;
        }

        body {
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            font-family: 'Cairo', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 20px;
            color: white; direction: rtl; box-sizing: border-box;
        }

        /* الإشعارات في منتصف الشاشة مع لمسة 3D */
        .toast-overlay {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2000; display: none;
            animation: popIn 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }
        .toast-box {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            padding: 30px 50px; border-radius: 24px;
            text-align: center; box-shadow: 0 25px 60px rgba(0,0,0,0.8);
        }

        .auth-container { width: 100%; max-width: 480px; }

        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 35px; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
        }

        /* حاوية العناوين مع أيقونة 3D */
        .section-header {
            font-size: 16px; font-weight: 700; color: var(--primary);
            margin: 25px 0 15px 0; border-bottom: 1px solid var(--border);
            padding-bottom: 8px; text-align: right;
            display: flex; align-items: center; gap: 10px;
        }

        .input-group { margin-bottom: 22px; position: relative; text-align: right; }
        
        label {
            display: block; font-size: 13px; color: var(--text-dim);
            margin-bottom: 8px; margin-right: 5px; font-weight: 600;
        }

        input, select {
            width: 100%; padding: 14px 16px;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--border);
            border-radius: 14px; color: white;
            font-size: 16px; font-family: 'Cairo';
            box-sizing: border-box; outline: none; transition: 0.3s;
        }

        input:focus { border-color: var(--primary); background: rgba(0, 0, 0, 0.4); }

        .pass-toggle {
            position: absolute; left: 15px; top: 40px;
            cursor: pointer; color: var(--text-dim); font-size: 18px;
            transition: transform 0.2s;
        }
        .pass-toggle:hover { transform: scale(1.2); }

        .phone-row { display: flex; gap: 10px; direction: ltr; }
        #countryCode { width: 100px; }

        .req-list { text-align: right; padding: 0; margin: 10px 0; list-style: none; font-size: 12px; }
        .req-list li { color: var(--error); margin-bottom: 5px; transition: 0.3s; }
        .req-list li.valid { color: var(--success); }

        .btn-main {
            width: 100%; padding: 16px;
            background: linear-gradient(135deg, var(--primary), #0284c7);
            border: none; border-radius: 14px;
            color: white; font-weight: 800; font-size: 16px;
            cursor: pointer; box-shadow: 0 10px 20px rgba(2, 132, 199, 0.3);
            margin-top: 15px; transition: all 0.3s;
        }

        .btn-main:active { transform: scale(0.98); }
        .btn-main:disabled { opacity: 0.6; cursor: wait; }

        .back-link { text-align: center; margin-top: 25px; }
        .back-link a { color: var(--text-dim); text-decoration: none; font-size: 14px; transition: 0.3s; }
        .back-link a:hover { color: var(--primary); }

        @keyframes popIn { from { opacity: 0; transform: translate(-50%, -40%) scale(0.9); } to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }
        
        /* تأثير 3D للشعار العلوي */
        .header-logo { text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="toastOverlay" class="toast-overlay">
        <div class="toast-box">
            <div id="toastIconContainer" style="height: 80px; margin-bottom: 10px;">
                </div>
            <div id="toastMsg" style="font-size: 18px; font-weight: 700;"></div>
        </div>
    </div>

    <div class="auth-container">
        <div class="glass-panel" id="regStep1">
            <div class="header-logo">
                <lord-icon
                    src="https://cdn.lordicon.com/ssvybplt.json"
                    trigger="loop"
                    delay="2000"
                    colors="primary:#38bdf8,secondary:#ffffff"
                    style="width:70px;height:70px">
                </lord-icon>
                <h2 style="margin:0;">بوابة المستثمرين</h2>
            </div>
            
            <form id="registerForm">
                <div class="section-header">
                    <lord-icon src="https://cdn.lordicon.com/bgebyrfe.json" trigger="hover" colors="primary:#38bdf8,secondary:#ffffff" style="width:30px;height:30px"></lord-icon>
                    <span>المعلومات الشخصية</span>
                </div>
                
                <div class="input-group">
                    <label>الاسم الكامل</label>
                    <input type="text" id="fullName" placeholder="أدخل اسمك كما في الهوية" required>
                </div>

                <div class="input-group">
                    <label>رقم الجوال</label>
                    <div class="phone-row">
                        <select id="countryCode">
                            <option value="+966">🇸🇦 +966</option>
                            <option value="+20">🇪🇬 +20</option>
                        </select>
                        <input type="tel" id="phone" placeholder="5XXXXXXXX" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="email" placeholder="example@mail.com" required>
                </div>

                <div class="input-group">
                    <label>تأكيد البريد الإلكتروني</label>
                    <input type="email" id="confirmEmail" placeholder="أعد كتابة البريد" required>
                </div>

                <div class="section-header">
                    <lord-icon src="https://cdn.lordicon.com/rqqkvjqf.json" trigger="hover" colors="primary:#38bdf8,secondary:#ffffff" style="width:30px;height:30px"></lord-icon>
                    <span>معلومات التسجيل</span>
                </div>

                <div class="input-group">
                    <label>اسم المستخدم</label>
                    <input type="text" id="username" placeholder="اسم مستعار للدخول" required>
                </div>

                <div class="input-group">
                    <label>كلمة المرور</label>
                    <input type="password" id="pass" placeholder="••••••••" required>
                    <span class="pass-toggle" onclick="togglePass('pass', this)">👁️</span>
                </div>

                <ul class="req-list">
                    <li id="reqLen">● 6 خانات على الأقل</li>
                    <li id="reqChar">● حرف واحد على الأقل (English)</li>
                    <li id="reqSpec">● رمز خاص واحد (@#$%)</li>
                </ul>

                <div class="input-group">
                    <label>تأكيد كلمة المرور</label>
                    <input type="password" id="confirmPass" placeholder="••••••••" required>
                    <span class="pass-toggle" onclick="togglePass('confirmPass', this)">👁️</span>
                </div>

                <button type="submit" id="submitBtn" class="btn-main">إنشاء حساب</button>
            </form>

            <div class="back-link">
                <a href="login.html">← الرجوع لصفحة الدخول</a>
            </div>
        </div>

        <div class="glass-panel" id="regStep2" style="display:none; text-align:center;">
            <lord-icon
                src="https://cdn.lordicon.com/tmqaflqo.json"
                trigger="loop"
                delay="1000"
                colors="primary:#38bdf8,secondary:#ffffff"
                style="width:90px;height:90px">
            </lord-icon>
            <h2 style="margin-top:0;">تفعيل الحساب</h2>
            <p style="color:var(--text-dim);">تم إرسال كود التحقق لبريدك الإلكتروني</p>
            <input type="text" id="regOtp" placeholder="0 0 0 0" maxlength="4" style="text-align:center; font-size:35px; letter-spacing:15px; background:rgba(0,0,0,0.4); margin:20px 0;">
            <div style="font-size:14px; margin-bottom:20px;">إعادة الإرسال خلال: <span id="regTimer" style="font-weight:bold;">05:00</span></div>
            <button id="resendRegBtn" class="btn-main" style="background:#334155;" disabled>إعادة إرسال</button>
            <button id="activateBtn" class="btn-main">تفعيل الحساب</button>
        </div>
    </div>

    <script>
        const WEBHOOK_URL = 'https://hook.eu1.make.com/4ityw5er8v5ps0ab9gxqojxh5zsitoz5';
        let generatedOtp = null;

        // 1. نظام الكاش (الحفظ التلقائي)
        const cacheFields = ['fullName', 'email', 'confirmEmail', 'phone', 'username'];
        window.onload = () => {
            cacheFields.forEach(id => {
                const savedValue = localStorage.getItem('cache_' + id);
                if (savedValue) document.getElementById(id).value = savedValue;
                
                document.getElementById(id).addEventListener('input', (e) => {
                    localStorage.setItem('cache_' + id, e.target.value);
                });
            });
        };

        // 2. إشعارات جمالية في المنتصف مع تغيير أيقونة الـ 3D حسب الحالة
        function showToast(msg, success = true) {
            const overlay = document.getElementById('toastOverlay');
            const iconContainer = document.getElementById('toastIconContainer');
            
            // حقن الأيقونة المناسبة (نجاح أم خطأ)
            if (success) {
                iconContainer.innerHTML = `<lord-icon src="https://cdn.lordicon.com/guqkthbs.json" trigger="in" colors="primary:#10b981" style="width:80px;height:80px"></lord-icon>`;
            } else {
                iconContainer.innerHTML = `<lord-icon src="https://cdn.lordicon.com/bmnlikjh.json" trigger="in" colors="primary:#ef4444" style="width:80px;height:80px"></lord-icon>`;
            }

            document.getElementById('toastMsg').innerText = msg;
            overlay.style.display = 'block';
            setTimeout(() => { overlay.style.display = 'none'; }, 3000);
        }

        // 3. معاينة كلمة المرور
        function togglePass(id, btn) {
            const input = document.getElementById(id);
            if (input.type === 'password') {
                input.type = 'text';
                btn.innerText = '🔒';
            } else {
                input.type = 'password';
                btn.innerText = '👁️';
            }
        }

        // 4. مراقبة قوة كلمة المرور
        const pass = document.getElementById('pass');
        pass.addEventListener('input', () => {
            const v = pass.value;
            pass.value = v.replace(/[^\x00-\x7F]/g, "");
            
            document.getElementById('reqLen').classList.toggle('valid', v.length >= 6);
            document.getElementById('reqChar').classList.toggle('valid', /[a-zA-Z]/.test(v));
            document.getElementById('reqSpec').classList.toggle('valid', /[\W_]/.test(v));
        });

        // 5. إرسال الكود لـ Make.com
        document.getElementById('registerForm').onsubmit = async (e) => {
            e.preventDefault();
            
            if(document.getElementById('email').value !== document.getElementById('confirmEmail').value) return showToast("البريد غير متطابق", false);
            if(document.getElementById('pass').value !== document.getElementById('confirmPass').value) return showToast("كلمة المرور غير متطابقة", false);

            generatedOtp = Math.floor(1000 + Math.random() * 9000).toString();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerText = "جاري إرسال الكود...";

            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        name: document.getElementById('fullName').value,
                        email: document.getElementById('email').value,
                        username: document.getElementById('username').value,
                        pin: generatedOtp
                    })
                });

                if (response.ok) {
                    showToast("تم إرسال كود التفعيل بنجاح!");
                    document.getElementById('regStep1').style.display = 'none';
                    document.getElementById('regStep2').style.display = 'block';
                    startTimer(300);
                    cacheFields.forEach(id => localStorage.removeItem('cache_' + id));
                }
            } catch (err) {
                showToast("فشل الاتصال، حاول مجدداً", false);
                btn.disabled = false; btn.innerText = "إنشاء حساب";
            }
        };

        function startTimer(duration) {
            let timer = duration;
            const text = document.getElementById('regTimer');
            const interval = setInterval(() => {
                let m = Math.floor(timer / 60), s = timer % 60;
                text.innerText = `${m}:${s < 10 ? '0'+s : s}`;
                if (--timer < 0) {
                    clearInterval(interval);
                    document.getElementById('resendRegBtn').disabled = false;
                    document.getElementById('resendRegBtn').style.background = "var(--primary)";
                }
            }, 1000);
        }

        document.getElementById('activateBtn').onclick = () => {
            if(document.getElementById('regOtp').value === generatedOtp) {
                showToast("تم تفعيل حسابكم بنجاح! 🎉");
                setTimeout(() => { window.location.href = "login.html"; }, 2500);
            } else {
                showToast("كود التحقق غير صحيح", false);
            }
        };
    </script>
</body>
</html>
