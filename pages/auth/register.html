<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة المستثمرين | إنشاء حساب</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,fill,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">

    <style>
        :root {
            --primary: #38bdf8;
            --primary-dark: #0284c7;
            --primary-glow: rgba(56, 189, 248, 0.3);
            --bg-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.1);
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        body {
            margin: 0; padding: 0;
            font-family: 'Cairo', sans-serif;
            background: radial-gradient(circle at 0% 0%, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            direction: rtl; overflow-x: hidden;
        }

        /* --- نظام الإشعارات المنبثقة (Toast 3D) --- */
        .toast-overlay {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 9999; display: none;
            animation: popIn 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }
        @keyframes popIn { from { opacity: 0; transform: translate(-50%, -40%) scale(0.8); } to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }

        .toast-box {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            padding: 25px 40px; border-radius: 24px;
            text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        /* --- الحاوية الرئيسية --- */
        .auth-container { width: 92%; max-width: 480px; margin: 20px auto; }
        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 32px; padding: 40px 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .section-header {
            display: flex; align-items: center; gap: 10px;
            color: var(--primary); margin: 25px 0 15px 0;
            border-bottom: 1px solid var(--border); padding-bottom: 8px;
        }
        .section-header span { font-size: 22px; font-variation-settings: 'FILL' 1; }

        /* --- تنسيق الحقول --- */
        .input-group { margin-bottom: 20px; position: relative; text-align: right; }
        .input-label { display: block; color: var(--text-muted); font-size: 13px; font-weight: 600; margin-bottom: 8px; margin-right: 5px; }

        input, select {
            width: 100%; padding: 14px 16px;
            background: rgba(0, 0, 0, 0.2); border: 1px solid var(--border);
            border-radius: 14px; color: white; font-family: 'Cairo'; font-size: 16px;
        }
        input:focus { outline: none; border-color: var(--primary); background: rgba(0,0,0,0.3); box-shadow: 0 0 0 4px var(--primary-glow); }

        /* تعديل القائمة المنسدلة */
        select option { background: #0f172a; color: white; }

        .phone-row { display: flex; gap: 8px; direction: ltr; }
        #countryCode { width: 100px; flex-shrink: 0; }

        /* زر معاينة الباسورد */
        .pass-wrapper { position: relative; }
        .toggle-btn {
            position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
            cursor: pointer; color: var(--text-muted); font-size: 20px; user-select: none;
        }
        .toggle-btn:hover { color: var(--primary); }

        /* --- مقياس القوة والشروط --- */
        .strength-container { margin-top: 15px; }
        .strength-bar { height: 4px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; margin-bottom: 10px; }
        #strengthFill { height: 100%; width: 0; transition: 0.5s ease; }
        
        .req-list { list-style: none; padding: 0; margin: 0; font-size: 12px; }
        .req-list li { display: flex; align-items: center; gap: 6px; color: var(--danger); margin-bottom: 4px; }
        .req-list li.valid { color: var(--success); }
        .req-list li span { font-size: 14px; }

        .btn-main {
            width: 100%; padding: 16px; margin-top: 20px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none; border-radius: 14px; color: white; font-weight: 800; font-size: 16px;
            cursor: pointer; box-shadow: 0 10px 20px rgba(2, 132, 199, 0.3);
        }
        .btn-main:active { transform: scale(0.98); }

        .switch-link { text-align: center; margin-top: 20px; font-size: 14px; }
        .switch-link a { color: var(--primary); text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>

<div class="toast-overlay" id="toastOverlay">
    <div class="toast-box">
        <span class="material-symbols-rounded" id="toastIcon" style="font-size: 40px; color: var(--primary);">info</span>
        <div id="toastMsg" style="margin-top: 10px; font-weight: 600;"></div>
    </div>
</div>

<div class="auth-container">
    <div class="glass-panel">
        <h2 style="text-align: center; margin-bottom: 30px; font-weight: 800;">إنشاء حساب جديد</h2>
        
        <form id="registerForm">
            <div class="section-header">
                <span class="material-symbols-rounded">person_filled</span>
                المعلومات الشخصية
            </div>
            
            <div class="input-group">
                <label class="input-label">الاسم الكامل</label>
                <input type="text" id="fullName" placeholder="أدخل اسمك الثلاثي" required>
            </div>

            <div class="input-group">
                <label class="input-label">رقم الجوال</label>
                <div class="phone-row">
                    <select id="countryCode">
                        <option value="+966">🇸🇦 +966</option>
                        <option value="+20">🇪🇬 +20</option>
                        <option value="+971">🇦🇪 +971</option>
                    </select>
                    <input type="tel" id="phone" placeholder="5xxxxxxxx" required>
                </div>
            </div>

            <div class="input-group">
                <label class="input-label">البريد الإلكتروني</label>
                <input type="email" id="email" placeholder="mail@example.com" required>
            </div>

            <div class="input-group">
                <label class="input-label">تأكيد البريد الإلكتروني</label>
                <input type="email" id="confirmEmail" placeholder="أعد كتابة البريد" required>
            </div>

            <div class="section-header">
                <span class="material-symbols-rounded">encrypted</span>
                معلومات التسجيل
            </div>

            <div class="input-group">
                <label class="input-label">اسم المستخدم</label>
                <input type="text" id="username" placeholder="User123" required>
            </div>

            <div class="input-group">
                <label class="input-label">كلمة المرور</label>
                <div class="pass-wrapper">
                    <input type="password" id="password" placeholder="••••••••" required>
                    <span class="material-symbols-rounded toggle-btn" onclick="togglePass('password', this)">visibility</span>
                </div>
            </div>

            <div class="input-group">
                <label class="input-label">تأكيد كلمة المرور</label>
                <div class="pass-wrapper">
                    <input type="password" id="confirmPassword" placeholder="••••••••" required>
                    <span class="material-symbols-rounded toggle-btn" onclick="togglePass('confirmPassword', this)">visibility</span>
                </div>
            </div>

            <div class="strength-container">
                <div class="strength-bar"><div id="strengthFill"></div></div>
                <ul class="req-list">
                    <li id="reqLen"><span class="material-symbols-rounded">check_circle</span>6 خانات على الأقل</li>
                    <li id="reqChar"><span class="material-symbols-rounded">check_circle</span>حرف واحد على الأقل</li>
                    <li id="reqSpec"><span class="material-symbols-rounded">check_circle</span>رمز خاص واحد (@#$%)</li>
                </ul>
            </div>

            <button type="submit" class="btn-main">إنشاء الحساب</button>
        </form>

        <div class="switch-link">
            <a href="login.html">الرجوع لصفحة الدخول</a>
        </div>
    </div>
</div>

<script>
    // --- 1. نظام الكاش (التخزين المؤقت) ---
    const fieldIds = ['fullName', 'email', 'confirmEmail', 'phone', 'username', 'countryCode'];
    
    document.addEventListener('DOMContentLoaded', () => {
        fieldIds.forEach(id => {
            const field = document.getElementById(id);
            const cached = localStorage.getItem('cache_' + id);
            if (cached) field.value = cached;

            field.addEventListener('input', () => {
                localStorage.setItem('cache_' + id, field.value);
            });
        });
    });

    // --- 2. معاينة كلمة المرور (Toggle) ---
    function togglePass(inputId, btn) {
        const input = document.getElementById(inputId);
        if (input.type === 'password') {
            input.type = 'text';
            btn.textContent = 'visibility_off';
            btn.style.color = 'var(--primary)';
        } else {
            input.type = 'password';
            btn.textContent = 'visibility';
            btn.style.color = 'var(--text-muted)';
        }
    }

    // --- 3. قوة كلمة المرور ---
    const passInput = document.getElementById('password');
    passInput.addEventListener('input', () => {
        const val = passInput.value;
        const requirements = {
            len: val.length >= 6,
            char: /[a-zA-Z]/.test(val),
            spec: /[\W_]/.test(val)
        };

        document.getElementById('reqLen').className = requirements.len ? 'valid' : '';
        document.getElementById('reqChar').className = requirements.char ? 'valid' : '';
        document.getElementById('reqSpec').className = requirements.spec ? 'valid' : '';

        const score = Object.values(requirements).filter(Boolean).length;
        const fill = document.getElementById('strengthFill');
        fill.style.width = (score * 33.3) + "%";
        fill.style.backgroundColor = score === 3 ? "var(--success)" : score === 2 ? "var(--warning)" : "var(--danger)";
    });

    // --- 4. نظام التنبيهات 3D ---
    function showToast(msg, type = 'info') {
        const overlay = document.getElementById('toastOverlay');
        document.getElementById('toastMsg').textContent = msg;
        overlay.style.display = 'block';
        setTimeout(() => { overlay.style.display = 'none'; }, 3000);
    }

    // عند الإرسال
    document.getElementById('registerForm').onsubmit = (e) => {
        e.preventDefault();
        if(document.getElementById('email').value !== document.getElementById('confirmEmail').value) {
            showToast("البريد الإلكتروني غير متطابق", 'danger');
            return;
        }
        showToast("جاري معالجة البيانات...", 'success');
        // هنا يتم الربط بـ Make.com أو Firebase
    };
</script>

</body>
</html>
