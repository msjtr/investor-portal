<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استعادة الحساب | بوابة المستثمرين</title>
    <link rel="icon" type="image/svg+xml" href="../../brand-icon.svg">
    <link rel="stylesheet" href="auth.css">
</head>
<body>
<div class="auth-container">
    <div class="glass-panel">
        <img src="../../brand-icon.svg" class="brand-logo">
        <h2>استعادة الوصول</h2>
        <p style="text-align: center; color: var(--text-muted); font-size: 14px; margin-bottom: 30px;">أدخل بريدك الإلكتروني لنرسل لك رمز التحقق.</p>
        <form id="forgotForm">
            <div class="input-group">
                <label class="input-label">البريد الإلكتروني</label>
                <input type="email" id="resetEmail" placeholder="m@" required>
            </div>
            <button type="submit" class="btn-main">إرسال الرمز</button>
        </form>
        <div class="switch-link"><a href="login.html">الرجوع لتسجيل الدخول</a></div>
    </div>
</div>
</body>
</html>
