<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استعادة كلمة المرور | بوابة المستثمرين</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet">
</head>
<body>

<div style="display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px;">
    <div class="glass-panel" style="width: 100%; max-width: 420px; padding: 45px 35px;">
        <img src="../../brand-icon.svg" class="brand-logo">
        
        <h2 style="text-align: center; margin-bottom: 15px;">استعادة الوصول</h2>
        <p style="text-align: center; color: var(--text-muted); font-size: 14px; margin-bottom: 30px;">
            أدخل بريدك الإلكتروني المسجل لنقوم بإرسال تعليمات إعادة تعيين كلمة المرور.
        </p>

        <form id="forgotPassForm">
            <div class="input-group">
                <label class="input-label">البريد الإلكتروني</label>
                <div class="input-wrapper">
                    <input type="email" id="resetEmail" placeholder="m@" required>
                </div>
            </div>

            <button type="submit" id="sendBtn" class="btn-main">إرسال رابط الاستعادة</button>
        </form>

        <div style="text-align: center; margin-top: 25px; font-size: 14px;">
            <a href="login.html" style="color: var(--primary); text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 5px;">
                <span class="material-symbols-rounded" style="font-size: 18px;">arrow_forward</span>
                الرجوع لتسجيل الدخول
            </a>
        </div>
    </div>
</div>

<script>
    document.getElementById('forgotPassForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('sendBtn');
        btn.disabled = true;
        btn.textContent = "جاري الإرسال...";

        // هنا يتم الربط مع Firebase أو Webhook لإرسال الإيميل
        // لمحاكاة التجربة الآن:
        setTimeout(() => {
            alert("إذا كان هذا البريد مسجلاً لدينا، فستصلك رسالة خلال دقائق.");
            window.location.href = "login.html";
        }, 2000);
    };
</script>
</body>
</html>
