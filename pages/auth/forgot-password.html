<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استعادة الحساب | بوابة المستثمرين</title>
    <link rel="stylesheet" href="../../styles/global.css">
</head>
<body>
<div class="auth-container">
    <div class="glass-panel">
        <div class="header-logo">
            <img src="../../brand-icon.svg" class="brand-logo" alt="بوابة المستثمرين">
            <h2>استعادة كلمة المرور</h2>
        </div>
        
        <p style="text-align: center; color: var(--text-muted); font-size: 14px; margin-bottom: 25px;">
            أدخل بريدك الإلكتروني المسجل لنرسل لك رمز التحقق.
        </p>

        <form id="forgotForm">
            <div class="input-group">
                <label class="input-label">البريد الإلكتروني</label>
                <div class="input-wrapper">
                    <input type="email" id="resetEmail" placeholder="m@" required>
                </div>
            </div>

            <button type="submit" class="btn-main">إرسال كود التحقق</button>
        </form>

        <div class="switch-link">
            <a href="login.html" style="display: flex; align-items: center; justify-content: center; gap: 8px;">
                <span class="material-symbols-rounded" style="font-size: 18px;">arrow_forward</span>
                الرجوع لتسجيل الدخول
            </a>
        </div>
    </div>
</div>
</body>
</html>
