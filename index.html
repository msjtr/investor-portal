<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة المستثمرين | جاري التحميل...</title>
    <script src="shared/scripts/storage.js"></script>
    <script src="shared/scripts/constants.js"></script>
    
    <style>
        body {
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
            font-family: sans-serif;
        }
        .loader {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #38bdf8;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="loader"></div>

    <script>
        /**
         * منطق التوجيه الذكي (Smart Redirect)
         */
        window.onload = () => {
            const user = Storage.get('user_session');

            if (user) {
                // إذا كان المستخدم مسجلاً، وجهه للوحة التحكم (Dashboard) مستقبلاً
                // حالياً سنبقيه هنا أو نوجهه لصفحة ترحيبية
                console.log("المستثمر مسجل دخول");
                // window.location.href = ROUTES.DASHBOARD; 
            } else {
                // إذا لم يكن مسجلاً، وجهه فوراً لصفحة تسجيل الدخول
                window.location.href = ROUTES.LOGIN;
            }
        };
    </script>
</body>
</html>
