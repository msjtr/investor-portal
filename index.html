<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة المستثمرين | جاري التحقق...</title>
    
    <link rel="icon" type="image/svg+xml" href="https://msjtr.github.io/investor-portal/assets/images/favicon.svg">
    <meta property="og:title" content="بوابة المستثمرين | Investor Portal">
    <meta property="og:description" content="منصة متطورة لمتابعة محفظتك الاستثمارية بأمان وسهولة.">
    <meta property="og:image" content="https://msjtr.github.io/investor-portal/assets/images/share-thumb.png">
    <meta property="og:url" content="https://msjtr.github.io/investor-portal/index.html">
    <meta property="og:type" content="website">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./shared/styles/variables.css">
    <script src="./shared/scripts/storage.js"></script>
    <script src="./shared/scripts/constants.js"></script>

    <style>
        body {
            background-color: #0f172a; 
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Cairo', sans-serif;
            color: white;
            overflow: hidden;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
        }

        .loading-container {
            text-align: center;
            animation: fadeIn 0.8s ease-in-out;
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(56, 189, 248, 0.1);
            border-radius: 50%;
            display: inline-block;
            position: relative;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }
        
        .loader::after {
            content: '';  
            box-sizing: border-box;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 3px solid transparent;
            border-bottom-color: var(--primary, #38bdf8);
        }

        @keyframes rotation { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }
        
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .status-text {
            margin-top: 25px;
            font-size: 0.95rem;
            color: #94a3b8;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="loading-container">
        <div class="loader"></div>
        <div class="status-text">جاري تأمين الاتصال بالمحفظة...</div>
    </div>

    <script>
        /**
         * محرك التوجيه الذكي (Smart Redirect Engine)
         */
        window.addEventListener('load', () => {
            // تأخير بسيط (1.2 ثانية) لمنح تجربة مستخدم سلسة واحترافية
            setTimeout(() => {
                try {
                    const user = Storage.get('user_session');

                    if (!user) {
                        // 1. إذا لم يكن هناك جلسة نشطة، التوجيه لصفحة الدخول
                        window.location.replace(ROUTES.LOGIN);
                    } else {
                        // 2. التحقق من حالة التوثيق (OTP)
                        if (user.status === 'pending_otp' || user.needVerify) {
                            window.location.replace(ROUTES.VERIFY);
                        } else {
                            // 3. المستخدم موثق وجاهز ➔ التوجيه للوحة التحكم
                            // إذا لم يكن مسار الداشبورد جاهزاً، سيوجه برمجياً للمسار الافتراضي
                            window.location.replace(ROUTES.DASHBOARD || './dashboard/index.html'); 
                        }
                    }
                } catch (error) {
                    console.error("Redirect System Error:", error);
                    // مسار طوارئ آمن في حال حدوث أي خطأ
                    window.location.replace("./auth/login/login.html");
                }
            }, 1200); 
        });
    </script>
</body>
</html>
