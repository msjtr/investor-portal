<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري التحويل... | بوابة المستثمرين</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    
    <meta http-equiv="refresh" content="2;url=pages/auth/login.html">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Cairo', sans-serif;
            color: #ffffff;
            overflow: hidden;
        }

        .loader-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            padding: 50px 40px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            max-width: 350px;
            width: 90%;
        }

        .spinner-box {
            position: relative;
            width: 60px;
            height: 60px;
            margin: 0 auto 25px auto;
        }

        /* تصميم الدائرة المتحركة المتطورة */
        .spinner {
            box-sizing: border-box;
            position: absolute;
            width: 100%;
            height: 100%;
            border: 4px solid transparent;
            border-top-color: #38bdf8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .spinner-inner {
            box-sizing: border-box;
            position: absolute;
            width: 70%;
            height: 70%;
            top: 15%;
            left: 15%;
            border: 3px solid transparent;
            border-top-color: #2563eb;
            border-radius: 50%;
            animation: spin 0.8s linear reverse infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        h2 {
            font-size: 20px;
            margin: 0 0 10px 0;
            letter-spacing: -0.5px;
        }

        p {
            color: #94a3b8;
            font-size: 14px;
            margin: 0;
        }

        /* نبض خفيف للنص */
        .pulse-text {
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
    </style>
</head>
<body>

    <div class="loader-container">
        <div class="spinner-box">
            <div class="spinner"></div>
            <div class="spinner-inner"></div>
        </div>
        <h2 class="pulse-text">بوابة المستثمرين</h2>
        <p>جاري توجيهك إلى تسجيل الدخول الآمن...</p>
    </div>

    <script>
        // التحويل عبر JavaScript للتأكيد في حال فشل الـ Meta tag
        setTimeout(() => {
            window.location.replace("pages/auth/login.html");
        }, 2000);
    </script>
</body>
</html>
