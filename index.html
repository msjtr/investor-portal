<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري التحويل... | بوابة المستثمرين</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/global.css">
    <meta http-equiv="refresh" content="2;url=pages/auth/login.html">
    <style>
        .loader-container {
            text-align: center;
            background: var(--glass);
            backdrop-filter: blur(20px);
            padding: 50px;
            border-radius: 40px;
            border: 1px solid var(--border);
            animation: fadeIn 1s ease-in-out;
        }
        .main-loader {
            width: 50px; height: 50px;
            border: 5px solid var(--glass);
            border-top: 5px solid var(--primary);
            border-radius: 50%;
            margin: 20px auto;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="loader-container">
        <img src="brand-icon.svg" class="brand-icon" style="width: 120px; margin-bottom: 20px;">
        <h2>مرحباً بك في بوابة المستثمرين</h2>
        <div class="main-loader"></div>
        <p style="color: var(--text-muted);">جاري تهيئة الاتصال الآمن...</p>
    </div>
</body>
</html>
