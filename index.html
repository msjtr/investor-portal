<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة المستثمر | منصة تيرا — عالمك بلا حدود</title>
    
    <link rel="icon" type="image/svg+xml" href="https://msjtr.github.io/investor-portal/assets/images/favicon.svg">
    <meta property="og:title" content="بوابة المستثمر | منصة تيرا">
    <meta property="og:description" content="بوابة استثمارية متطورة تتيح لك متابعة وإدارة محفظتك المالية بأمان سيبراني متكامل وفق بنية Zero Trust.">
    <meta property="og:image" content="https://msjtr.github.io/investor-portal/assets/images/share-thumb.png">
    <meta property="og:url" content="https://msjtr.github.io/investor-portal/index.html">
    <meta property="og:type" content="website">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./shared/styles/variables.css">
    
    <script src="./shared/scripts/storage.js"></script>
    <script src="./shared/scripts/constants.js"></script>
    <script src="./shared/scripts/helpers.js"></script>

    <style>
        body {
            background-color: #0a2540; /* لون الخلفية الرسمي لهوية TERA */
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Cairo', sans-serif;
            color: #ffffff;
            overflow: hidden;
            background: radial-gradient(circle at center, #0f355c 0%, #0a2540 100%);
        }

        /* حاوية التحميل والتوجيه الفاخرة */
        .loading-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.8s ease-out;
            padding: 35px 45px;
            background-color: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: var(--radius-md, 16px);
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        .logo-box {
            margin-bottom: 25px;
        }

        .logo-box img {
            height: 50px;
            width: auto;
            filter: drop-shadow(0 0 12px rgba(56, 189, 248, 0.3));
        }

        /* الـ Loader الدائري السماوي المتوافق مع الهوية */
        .loader {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(56, 189, 248, 0.1);
            border-radius: 50%;
            display: inline-block;
            position: relative;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }
        
        .loader::after {
            content: '';  
            box-sizing: border-box;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 3px solid transparent;
            border-bottom-color: var(--primary, #38bdf8);
        }

        @keyframes rotation { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }
        
        @keyframes fadeIn { 
            from { opacity: 0; transform: scale(0.95); } 
            to { opacity: 1; transform: scale(1); } 
        }

        .status-text {
            margin-top: 25px;
            font-size: 0.95rem;
            color: #e2e8f0;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .brand-text {
            color: var(--primary, #38bdf8);
            font-size: 0.75rem;
            font-weight: 900;
            margin-top: 8px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="loading-wrapper">
        <div class="logo-box">
            <img src="https://msjtr.github.io/investor-portal/assets/images/logo.svg" alt="منصة تيرا">
        </div>
        <div class="loader"></div>
        <div class="status-text" id="statusText">جاري تأمين الاتصال والتحقق من الهوية...</div>
        <div class="brand-text">TERA — عالمك بلا حدود</div>
    </div>

    <script>
        /**
         * محرك التوجيه الأمني والمصادقة (Secure Routing Engine)
         * يحلل الجلسة المشفرة ويوجه المستثمر حسب حالة التوثيق وصلاحية الأجهزة
         */
        window.addEventListener('load', () => {
            const statusElem = document.getElementById('statusText');

            // تسجيل بصمة الجهاز استباقياً لضمان جاهزيتها في المتصفح
            if (typeof Helpers !== 'undefined' && typeof Helpers.generateDeviceFingerprint === 'function') {
                Helpers.generateDeviceFingerprint();
            }

            // تأخير متزن لمنح إحساس بالفحص الأمني العميق وتجنب الوميض المزعج للعين
            setTimeout(() => {
                try {
                    // قراءة الجلسة المعتمدة باستخدام محرك التخزين المشفر
                    const userSession = typeof Storage !== 'undefined' ? Storage.get('user_session') : null;
                    const tempUser = typeof Storage !== 'undefined' ? Storage.get('temp_user') : null;

                    if (userSession && userSession.token) {
                        // 1. المستخدم يمتلك جلسة مشفرة صالحة
                        if (userSession.needVerify || userSession.status === 'pending_otp') {
                            if (statusElem) statusElem.innerText = "مطلوب مصادقة أمنية إضافية...";
                            window.location.replace(typeof ROUTES !== 'undefined' && ROUTES.VERIFY ? ROUTES.VERIFY : './auth/verify-otp/verify.html');
                        } else {
                            if (statusElem) statusElem.innerText = "تم الاتصال بنجاح. جاري فتح المحفظة...";
                            window.location.replace(typeof ROUTES !== 'undefined' && ROUTES.DASHBOARD ? ROUTES.DASHBOARD : './dashboard/index.html');
                        }
                    } else if (tempUser && tempUser.email) {
                        // 2. المستخدم في منتصف رحلة تسجيل أو دخول ولم يكمل إدخال الـ OTP
                        if (statusElem) statusElem.innerText = "جاري استكمال التحقق الأمني...";
                        window.location.replace(typeof ROUTES !== 'undefined' && ROUTES.VERIFY ? ROUTES.VERIFY : './auth/verify-otp/verify.html');
                    } else {
                        // 3. زائر جديد أو جلسة منتهية ➔ التوجيه الفوري لبوابة الدخول
                        if (statusElem) statusElem.innerText = "جاري التوجيه لبوابة الدخول الآمن...";
                        window.location.replace(typeof ROUTES !== 'undefined' && ROUTES.LOGIN ? ROUTES.LOGIN : './auth/login/login.html');
                    }
                } catch (error) {
                    console.error("[Routing Security Error]:", error);
                    // مسار الطوارئ الفوري في حال التلاعب أو تلف الذاكرة
                    if (typeof Storage !== 'undefined') Storage.clearAll();
                    window.location.replace("./auth/login/login.html");
                }
            }, 1400); 
        });
    </script>
</body>
</html>
