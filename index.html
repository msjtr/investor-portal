<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة المستثمر | منصة تيرا — عالمك بلا حدود</title>
    
    <link rel="icon" type="image/svg+xml" href="https://msjtr.github.io/investor-portal/assets/images/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="./shared/styles/variables.css">
    <link rel="stylesheet" href="./shared/styles/animations.css">
    <link rel="stylesheet" href="./shared/styles/utilities.css">

    <style>
        body {
            background-color: #0a2540;
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Cairo', sans-serif;
            color: #ffffff;
            overflow: hidden;
            background: radial-gradient(circle at center, #0f355c 0%, #0a2540 100%);
        }

        .loading-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.8s ease-out;
            padding: 35px 45px;
            background-color: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            text-align: center;
            transition: all 0.5s ease;
        }

        /* تأثير التلاشي عند الانتقال */
        .fade-out-active {
            opacity: 0;
            transform: scale(0.95);
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(56, 189, 248, 0.1);
            border-radius: 50%;
            display: inline-block;
            position: relative;
            animation: rotation 1s linear infinite;
        }
        
        .loader::after {
            content: '';  
            position: absolute;
            left: 50%; top: 50%;
            transform: translate(-50%, -50%);
            width: 42px; height: 42px;
            border-radius: 50%;
            border: 3px solid transparent;
            border-bottom-color: #38bdf8;
        }

        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        .status-text { margin-top: 25px; font-size: 0.95rem; color: #e2e8f0; font-weight: 700; min-height: 27px; transition: opacity 0.3s ease; }
        .brand-text { color: #38bdf8; font-size: 0.75rem; font-weight: 900; margin-top: 8px; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="loading-wrapper" id="loadingWrapper">
        <div class="logo-box">
            <img src="https://msjtr.github.io/investor-portal/assets/images/logo.svg" alt="تِيرا" style="height: 50px; margin-bottom: 20px;">
        </div>
        <div class="loader"></div>
        <div class="status-text" id="statusText">جاري التحقق من أمان الجلسة...</div>
        <div class="brand-text">TERA — عالمك بلا حدود</div>
    </div>

    <script type="module">
        import { getCustomerName } from './js/core.js';
        import { getFromStorage } from './shared/scripts/storage.js';

        window.addEventListener('load', () => {
            const statusElem = document.getElementById('statusText');
            const wrapper = document.getElementById('loadingWrapper');

            // دالة انتقال ناعمة (Smooth Redirect)
            const smoothRedirect = (url) => {
                wrapper.classList.add('fade-out-active');
                setTimeout(() => window.location.replace(url), 500);
            };

            // تأخير بوقار هندسي لمنح تجربة الأمان السيبراني فخامتها البصرية لقارئ المحفظة
            setTimeout(async () => {
                try {
                    const userSession = getFromStorage('user_session'); 
                    const pendingEmail = getFromStorage('pending_email');

                    if (userSession && userSession.email) {
                        let name = "";
                        // حماية إضافية: في حال تأخر قاعدة البيانات، لا يتوقف التوجيه بل يكمل الانتقال بأمان
                        try {
                            name = await getCustomerName(userSession.email);
                        } catch (nameError) {
                            console.warn("[Router] Name fetch delayed:", nameError);
                        }

                        if (statusElem) {
                            statusElem.style.opacity = 0;
                            setTimeout(() => {
                                statusElem.innerText = name ? `مرحباً بك يا ${name}... جاري فتح المحفظة` : `مرحباً بك... جاري فتح المحفظة`;
                                statusElem.style.opacity = 1;
                            }, 200);
                        }
                        
                        setTimeout(() => smoothRedirect('./pages/client/dashboard/index.html'), 1200);
                    } 
                    else if (pendingEmail) {
                        if (statusElem) {
                            statusElem.style.opacity = 0;
                            setTimeout(() => {
                                statusElem.innerText = "جاري استكمال التحقق من الرمز...";
                                statusElem.style.opacity = 1;
                            }, 200);
                        }
                        setTimeout(() => smoothRedirect('./auth/verify-otp/verify.html'), 1000);
                    } 
                    else {
                        if (statusElem) {
                            statusElem.style.opacity = 0;
                            setTimeout(() => {
                                statusElem.innerText = "جاري التوجيه لبوابة الدخول...";
                                statusElem.style.opacity = 1;
                            }, 200);
                        }
                        setTimeout(() => smoothRedirect('./auth/login/login.html'), 800);
                    }
                } catch (error) {
                    console.error("[Routing Error]:", error);
                    smoothRedirect("./auth/login/login.html");
                }
            }, 1200);
        });
    </script>
</body>
</html>
